<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Custom Racer – Updated Timer + Wall Fix</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>

<style>
  :root{
    --ui-bg:rgba(6,10,20,0.9);
    --muted:#cbd5e1;
    --accent:#38bdf8;
    --danger:#ef4444;
    --good:#22c55e;
  }
  html,body{
    margin:0;
    height:100%;
    background:#020617;
    color:#e5e7eb;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    overflow:hidden;
  }
  #canvas-wrap{
    position:fixed;
    inset:0;
  }
  canvas{width:100%;height:100%;display:block;}

  .panel{
    background:var(--ui-bg);
    backdrop-filter:blur(10px);
    padding:6px 8px;
    border-radius:10px;
    border:1px solid rgba(148,163,184,0.5);
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    align-items:center;
  }
  .topbar{
    position:fixed;
    left:10px;
    right:10px;
    top:6px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    z-index:20;
    justify-content:space-between;
  }
  label{
    font-size:10px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.06em;
  }
  select,button{
    background:rgba(15,23,42,0.96);
    border:1px solid rgba(148,163,184,0.7);
    color:#e5e7eb;
    padding:3px 7px;
    border-radius:6px;
    font-size:11px;
  }
  button{cursor:pointer;}
  button.primary{border-color:var(--accent);color:var(--accent);}
  button.danger{border-color:var(--danger);color:var(--danger);}

  #hud{
    position:fixed;
    right:10px;
    top:10px;
    background:var(--ui-bg);
    border-radius:10px;
    border:1px solid rgba(148,163,184,0.5);
    padding:6px 8px;
    font-size:11px;
    z-index:20;
  }
  #hud div{margin-bottom:2px;}
  #hud div:last-child{margin-bottom:0;}

  #controls{
    position:fixed;
    left:0;right:0;
    bottom:10px;
    display:flex;
    justify-content:center;
    gap:10px;
    pointer-events:none;
    z-index:20;
  }
  .btn{
    width:70px;height:70px;
    border-radius:16px;
    background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(15,23,42,0.96));
    color:#f9fafb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    pointer-events:auto;
    border:1px solid rgba(148,163,184,0.6);
    box-shadow:0 8px 20px rgba(0,0,0,0.45);
    user-select:none;
  }
  #btn-forward{width:120px;border-radius:20px;}
  #btn-boost{width:80px;border-radius:18px;font-size:13px;}

  #lights{
    position:fixed;
    top:80px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    z-index:30;
  }
  .light{
    width:30px;height:30px;
    border-radius:50%;
    background:#1f2933;
    border:2px solid #111827;
    box-shadow:0 0 10px rgba(0,0,0,0.7);
  }
  .light.on{
    background:#ef4444;
    box-shadow:0 0 18px #f97373;
  }

  .banner{
    position:fixed;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    padding:10px 16px;
    border-radius:999px;
    background:rgba(15,23,42,0.96);
    border:1px solid rgba(148,163,184,0.7);
    font-size:18px;
    z-index:40;
    display:none;
  }

  #boostBar{
    position:fixed;
    left:50%;
    bottom:190px;
    transform:translateX(-50%);
    width:180px;
    height:10px;
    border-radius:999px;
    background:rgba(15,23,42,0.96);
    border:1px solid rgba(148,163,184,0.6);
    overflow:hidden;
    z-index:20;
  }
  #boostFill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#22c55e,#eab308,#ef4444);
  }

  #extraHud{
    position:fixed;
    left:10px;
    top:10px;
    background:var(--ui-bg);
    border-radius:10px;
    border:1px solid rgba(148,163,184,0.6);
    padding:6px 8px;
    font-size:11px;
    z-index:20;
  }
  .bar{
    width:100%;height:6px;
    border-radius:999px;
    background:rgba(15,23,42,0.96);
    overflow:hidden;
    margin-top:2px;
  }
  .bar-fill{
    height:100%;
    width:50%;
    border-radius:999px;
  }
  #damageFill{background:linear-gradient(90deg,#22c55e,#eab308,#ef4444);}
  #fuelFill{background:linear-gradient(90deg,#22c55e,#22c55e,#eab308);}

  #toast{
    position:fixed;
    left:50%;
    top:20px;
    transform:translateX(-50%);
    background:rgba(15,23,42,0.98);
    border-radius:999px;
    border:1px solid rgba(148,163,184,0.7);
    padding:4px 10px;
    font-size:11px;
    display:none;
    z-index:50;
  }

  #minimap{
    position:fixed;
    left:10px;
    bottom:10px;
    width:140px;
    height:140px;
    border-radius:16px;
    background:rgba(15,23,42,0.96);
    border:1px solid rgba(148,163,184,0.7);
    overflow:hidden;
    z-index:25;
  }
  #minimapCanvas{
    width:100%;
    height:100%;
    display:block;
  }

  #rainOverlay{
    pointer-events:none;
    position:fixed;
    inset:0;
    background:radial-gradient(circle at top,#0f172a33,transparent 60%);
    z-index:5;
  }

  /* Garage */
  #garage{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at top,#0f172a 0,#020617 55%,#000 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding-top:40px;
    z-index:60;
  }
  #garageTitle{
    font-size:20px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:#e5e7eb;
    margin-bottom:10px;
  }
  #garageRow{
    display:flex;
    gap:14px;
    margin-bottom:10px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .carCard{
    width:130px;
    padding:8px;
    border-radius:12px;
    background:rgba(15,23,42,0.96);
    border:1px solid rgba(148,163,184,0.7);
    cursor:pointer;
    display:flex;
    flex-direction:column;
    gap:4px;
    opacity:0.4;
    position:relative;
  }
  .carCard.unlocked{
    opacity:1;
  }
  .lockTag{
    position:absolute;
    right:6px;
    top:6px;
    font-size:9px;
    padding:2px 5px;
    border-radius:999px;
    border:1px solid rgba(148,163,184,0.7);
    background:rgba(15,23,42,0.96);
  }
  .carName{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
  }
  .statRow{
    font-size:9px;
    color:var(--muted);
    display:flex;
    justify-content:space-between;
  }
  .statBar{
    width:100%;
    height:4px;
    border-radius:999px;
    background:#020617;
    overflow:hidden;
  }
  .statFill{
    height:100%;
    border-radius:999px;
    background:linear-gradient(90deg,#22c55e,#eab308,#ef4444);
  }
  .carCard.selected{
    border-color:var(--accent);
    box-shadow:0 0 0 1px rgba(56,189,248,0.5);
  }

  #garageBottom{
    margin-top:10px;
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
    justify-content:center;
  }
  #garageHint{
    font-size:11px;
    color:var(--muted);
  }
  #garageStartBtn{
    padding:6px 14px;
    border-radius:999px;
    border:1px solid var(--accent);
    background:rgba(15,23,42,0.96);
    color:var(--accent);
    font-size:12px;
    cursor:pointer;
  }
  #garageBackBtn{
    padding:6px 10px;
    border-radius:999px;
    border:1px solid rgba(148,163,184,0.7);
    background:rgba(15,23,42,0.96);
    color:#e5e7eb;
    font-size:11px;
    cursor:pointer;
  }

  #garagePreviewWrap{
    margin-top:8px;
    width:220px;
    height:140px;
    border-radius:14px;
    border:1px solid rgba(148,163,184,0.7);
    background:radial-gradient(circle at top,#020617,#020617 60%,#000);
    overflow:hidden;
    position:relative;
  }
  #garagePreviewCanvas{
    width:100%;
    height:100%;
    display:block;
  }
  #garagePreviewLabel{
    position:absolute;
    left:8px;
    bottom:6px;
    font-size:10px;
    color:#9ca3af;
    letter-spacing:0.08em;
    text-transform:uppercase;
  }

  /* Home screen */
  #homeScreen{
    position:fixed;inset:0;z-index:70;
    background:radial-gradient(circle at top,#0f172a,#020617 60%,#000);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#e5e7eb;font-family:system-ui;
  }
  #homeTitle{
    font-size:26px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    margin-bottom:18px;
  }
  .homeBtn{
    margin:4px 0;
    padding:6px 14px;
    border-radius:999px;
    border:1px solid var(--accent);
    background:rgba(15,23,42,0.96);
    color:var(--accent);
    font-size:12px;
    cursor:pointer;
  }

  #modeLabel{
    position:fixed;
    left:50%;
    top:6px;
    transform:translateX(-50%);
    background:var(--ui-bg);
    border-radius:999px;
    border:1px solid rgba(148,163,184,0.7);
    padding:4px 10px;
    font-size:11px;
    z-index:20;
  }
</style>
</head>

<body>
<div id="canvas-wrap"></div>

<div class="topbar">
  <div class="panel">
    <label>Track</label>
    <select id="trackSelect">
      <option value="classic">Classic</option>
      <option value="figure8">Figure 8</option>
      <option value="oval">Oval</option>
      <option value="city">City</option>
    </select>

    <label>AI</label>
    <select id="aiCount">
      <option value="1">1</option>
      <option value="2" selected>2</option>
      <option value="4">4</option>
    </select>

    <label>Laps</label>
    <select id="lapCount">
      <option value="1">1</option>
      <option value="3" selected>3</option>
      <option value="5">5</option>
    </select>

    <button id="startBtn" class="primary">Start</button>
    <button id="pauseBtn">Pause</button>
    <button id="resetBtn" class="danger">Reset</button>
  </div>

  <div class="panel">
    <button id="menuBtn">Menu</button>
    <button id="changeCarBtn">Change Car</button>
  </div>
</div>

<div id="modeLabel">Mode: Race</div>

<div id="hud">
  <div id="hudLap">Lap: 0 / 3</div>
  <div id="hudPos">Pos: 1 / 1</div>
  <div id="hudSpeed">Speed: 0</div>
  <div id="hudBest">Best: --</div>
  <div id="hudTimer">Time: 0.000</div>
</div>

<div id="extraHud">
  <div>Damage</div>
  <div class="bar"><div id="damageFill" class="bar-fill"></div></div>
  <div style="margin-top:4px;">Fuel</div>
  <div class="bar"><div id="fuelFill" class="bar-fill"></div></div>
</div>

<div id="controls">
  <div id="btn-left" class="btn">◀</div>
  <div id="btn-forward" class="btn">▲</div>
  <div id="btn-right" class="btn">▶</div>
  <div id="btn-boost" class="btn">BOOST</div>
</div>

<div id="lights">
  <div class="light" id="l1"></div>
  <div class="light" id="l2"></div>
  <div class="light" id="l3"></div>
  <div class="light" id="l4"></div>
  <div class="light" id="l5"></div>
</div>

<div class="banner" id="bannerText">GO!</div>

<div id="boostBar"><div id="boostFill"></div></div>

<div id="toast"></div>

<div id="minimap">
  <canvas id="minimapCanvas"></canvas>
</div>

<div id="rainOverlay"></div>

<!-- Home screen -->
<div id="homeScreen">
  <div id="homeTitle">CUSTOM RACER</div>
  <button class="homeBtn" id="modeRaceBtn">Race</button>
  <button class="homeBtn" id="modeTimeBtn">Time Trial</button>
  <button class="homeBtn" id="modeCopsBtn">Escape Cops</button>
  <div style="font-size:11px;color:#9ca3af;margin-top:10px;">
    Choose a mode, then pick your car in the Garage.
  </div>
</div>

<!-- Garage -->
<div id="garage">
  <div id="garageTitle">GARAGE</div>
  <div id="garageRow">
<script>
const V3 = THREE.Vector3;
const Q = THREE.Quaternion;

/* MAIN RENDERER */

const container = document.getElementById('canvas-wrap');
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7fb7ff);
scene.fog = new THREE.FogExp2(0x7fb7ff,0.0007);

const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,6,14);

const hemi = new THREE.HemisphereLight(0xffffff,0x334155,0.9);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xffffff,1.0);
sun.position.set(40,60,20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-80;
sun.shadow.camera.right=80;
sun.shadow.camera.top=80;
sun.shadow.camera.bottom=-80;
scene.add(sun);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(1000,1000),
  new THREE.MeshStandardMaterial({color:0x14532d,roughness:0.95})
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.02;
ground.receiveShadow = true;
scene.add(ground);

/* SIMPLE DAY/NIGHT CYCLE */

let dayTime = 0; // 0..1
function updateDayNight(dt){
  dayTime = (dayTime + dt*0.02) % 1;
  const angle = dayTime * Math.PI*2;
  const radius = 80;
  sun.position.set(Math.cos(angle)*radius,Math.sin(angle)*radius,40);
  const isNight = sun.position.y < 5;
  const skyColor = isNight ? 0x020617 : 0x7fb7ff;
  scene.background.setHex(skyColor);
  scene.fog.color.setHex(skyColor);
  sun.intensity = isNight ? 0.3 : 1.0;
  hemi.intensity = isNight ? 0.25 : 0.9;
}

/* LIGHT RAIN */

const rainGroup = new THREE.Group();
scene.add(rainGroup);

function initRain(){
  const count = 400;
  for(let i=0;i<count;i++){
    const g = new THREE.SphereGeometry(0.03,4,4);
    const m = new THREE.MeshBasicMaterial({color:0x93c5fd,transparent:true,opacity:0.7});
    const drop = new THREE.Mesh(g,m);
    drop.position.set(
      (Math.random()-0.5)*120,
      10+Math.random()*20,
      (Math.random()-0.5)*120
    );
    drop.userData.speed = 15+Math.random()*10;
    rainGroup.add(drop);
  }
}
initRain();

function updateRain(dt){
  rainGroup.children.forEach(d=>{
    d.position.y -= d.userData.speed*dt;
    if(d.position.y < 0){
      d.position.y = 15+Math.random()*10;
      d.position.x = (Math.random()-0.5)*120;
      d.position.z = (Math.random()-0.5)*120;
    }
  });
}

/* TRACKS */

function makeSpline(points,closed=true){
  return new THREE.CatmullRomCurve3(points,closed,'catmullrom',0.5);
}

function buildClassic(){
  return makeSpline([
    new V3(0,0,0),
    new V3(20,0,-10),
    new V3(35,0,8),
    new V3(18,0,22),
    new V3(-10,0,18),
    new V3(-30,0,4),
    new V3(-18,0,-16),
    new V3(0,0,-22),
    new V3(20,0,-10)
  ],true);
}

function buildFigure8(){
  const pts=[],r=22;
  for(let i=0;i<20;i++){
    const a=i/20*Math.PI*2;
    const x=Math.cos(a)*r+Math.sin(a)*r*0.4;
    const z=Math.sin(a)*r;
    pts.push(new V3(x,0,z));
  }
  return makeSpline(pts,true);
}

function buildOval(){
  const pts=[],w=40,h=18;
  for(let i=0;i<32;i++){
    const a=i/32*Math.PI*2;
    pts.push(new V3(Math.cos(a)*w,0,Math.sin(a)*h));
  }
  return makeSpline(pts,true);
}

function buildCity(){
  const pts=[],radius=26;
  for(let i=0;i<32;i++){
    const a=i/32*Math.PI*2;
    const r=radius+Math.sin(a*3)*4;
    const x=Math.cos(a)*r;
    const z=Math.sin(a)*r;
    pts.push(new V3(x,0,z));
  }
  return makeSpline(pts,true);
}

let spline = buildClassic();
let roadMesh=null;
let centerSamples=[];
let trackWalls=[];
let checkpointArrows=[];

/* ROAD MESH */

function buildRoad(spline,width=7,segments=600){
  if(roadMesh) scene.remove(roadMesh);
  const positions=new Float32Array((segments+1)*2*3);
  const indices=new Uint32Array(segments*6);
  let pi=0,ii=0;

  for(let i=0;i<=segments;i++){
    const t=i/segments;
    const p=spline.getPointAt(t);
    const tan=spline.getTangentAt(t).normalize();
    const bin=new V3().crossVectors(new V3(0,1,0),tan).normalize();

    const left=p.clone().add(bin.clone().multiplyScalar(-width*0.5));
    const right=p.clone().add(bin.clone().multiplyScalar(width*0.5));

    positions[pi++]=left.x;positions[pi++]=left.y+0.01;positions[pi++]=left.z;
    positions[pi++]=right.x;positions[pi++]=right.y+0.01;positions[pi++]=right.z;

    if(i<segments){
      const a=i*2,b=i*2+1,c=(i+1)*2,d=(i+1)*2+1;
      indices[ii++]=a;indices[ii++]=b;indices[ii++]=c;
      indices[ii++]=b;indices[ii++]=d;indices[ii++]=c;
    }
  }

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
  geo.setIndex(new THREE.BufferAttribute(indices,1));
  geo.computeVertexNormals();

  const mat=new THREE.MeshStandardMaterial({color:0x111827,roughness:0.9,metalness:0.05});
  roadMesh=new THREE.Mesh(geo,mat);
  roadMesh.receiveShadow=true;
  scene.add(roadMesh);
}

/* TRACK WALLS */

function buildTrackWalls(spline,width=7,segments=120){
  trackWalls.forEach(w=>scene.remove(w));
  trackWalls=[];
  const wallMat=new THREE.MeshStandardMaterial({
    color:0x0f172a,
    roughness:0.5,
    metalness:0.2
  });

  const half=width*0.5;

  for(let i=0;i<segments;i++){
    const t1=i/segments;
    const t2=(i+1)/segments;
    const p1=spline.getPointAt(t1);
    const p2=spline.getPointAt(t2);
    const tan=p2.clone().sub(p1).normalize();
    const bin=new V3().crossVectors(new V3(0,1,0),tan).normalize();

    const leftMid=p1.clone().add(p2).multiplyScalar(0.5)
      .add(bin.clone().multiplyScalar(-half-0.4));
    const rightMid=p1.clone().add(p2).multiplyScalar(0.5)
      .add(bin.clone().multiplyScalar(half+0.4));

    const segLen=p1.distanceTo(p2)+0.2;
    const wallGeo=new THREE.BoxGeometry(segLen,1.6,0.4);

    const leftWall=new THREE.Mesh(wallGeo,wallMat);
    leftWall.position.copy(leftMid);
    leftWall.position.y=0.8;
    leftWall.lookAt(leftMid.clone().add(tan));
    leftWall.castShadow=true;
    leftWall.receiveShadow=true;
    scene.add(leftWall);
    trackWalls.push(leftWall);

    const rightWall=new THREE.Mesh(wallGeo,wallMat);
    rightWall.position.copy(rightMid);
    rightWall.position.y=0.8;
    rightWall.lookAt(rightMid.clone().add(tan));
    rightWall.castShadow=true;
    rightWall.receiveShadow=true;
    scene.add(rightWall);
    trackWalls.push(rightWall);
  }
}

/* CENTER SAMPLES */

function buildCenterSamples(spline,count=1000){
  centerSamples=[];
  for(let i=0;i<count;i++){
    const t=i/count;
    centerSamples.push({t,p:spline.getPointAt(t)});
  }
}

function nearestCenterPoint(pos){
  let best=null,bestDist=Infinity,bestIdx=0;
  for(let i=0;i<centerSamples.length;i+=5){
    const d=pos.distanceToSquared(centerSamples[i].p);
    if(d<bestDist){bestDist=d;best=centerSamples[i];bestIdx=i;}
  }
  const start=Math.max(0,bestIdx-20);
  const end=Math.min(centerSamples.length-1,bestIdx+20);
  for(let i=start;i<=end;i++){
    const d=pos.distanceToSquared(centerSamples[i].p);
    if(d<bestDist){bestDist=d;best=centerSamples[i];}
  }
  return {point:best.p.clone(),t:best.t};
}

/* STADIUM WALLS */

let stadiumWalls=[];
function buildStadium(){
  stadiumWalls.forEach(w=>scene.remove(w));
  stadiumWalls=[];
  const wallMat=new THREE.MeshStandardMaterial({
    color:0x0f172a,
    roughness:0.6,
    metalness:0.1
  });
  const radius=55;
  const height=4;
  const segments=40;

  for(let i=0;i<segments;i++){
    const a1=(i/segments)*Math.PI*2;
    const a2=((i+1)/segments)*Math.PI*2;
    const mid=(a1+a2)/2;
    const x=Math.cos(mid)*radius;
    const z=Math.sin(mid)*radius;

    const wall=new THREE.Mesh(
      new THREE.BoxGeometry(8,height,0.6),
      wallMat
    );
    wall.position.set(x,height/2,z);
    wall.lookAt(0,height/2,0);
    wall.castShadow=true;
    wall.receiveShadow=true;
    scene.add(wall);
    stadiumWalls.push(wall);
  }
}

/* WALL COLLISION FIX — prevents getting stuck */

function resolveWallCollision(car, wallPos, minDist = 3.5) {
  const dx = car.pos.x - wallPos.x;
  const dz = car.pos.z - wallPos.z;
  const dist = Math.sqrt(dx*dx + dz*dz);

  if (dist < minDist) {
    const push = minDist - dist;
    const dir = new THREE.Vector3(dx, 0, dz).normalize();

    // Push car OUT of the wall
    car.pos.add(dir.multiplyScalar(push * 1.4));

    // Give a small bounce so it never gets stuck
    car.speed = Math.max(car.speed, 0.12);

    // Add damage + shake
    car.damage = Math.min(1, car.damage + 0.03);
    cameraShakeTimer = 0.15;
  }
}

/* DAMAGE VISUALS */

function updateCarDamageVisual(car){
  const d = car.damage;

  car.mesh.traverse(o=>{
    if(o.isMesh && o.material && o.material.color){
      if(!o.userData.baseColor)
        o.userData.baseColor = o.material.color.clone();

      const base = o.userData.baseColor;
      const dark = base.clone().lerp(new THREE.Color(0x111827), d * 0.8);

      o.material.color.copy(dark);
      o.material.roughness = Math.min(1, 0.3 + 0.7*d);
    }
  });

  if(d > 0.6){
    const p = car.mesh.position.clone();
    p.y += 0.4;
    addSmoke(p);
  }
}

/* FLAMES UPDATE */

function updateFlames(car, boosting, dt){
  if(!car.flames) return;

  const targetOpacity = boosting ? 0.9 : 0.0;

  car.flames.forEach(f=>{
    f.material.opacity += (targetOpacity - f.material.opacity) * Math.min(1, dt * 10);

    if(boosting){
      f.scale.setScalar(1 + Math.random()*0.4);
    } else {
      f.scale.setScalar(1);
    }
  });
}

/* PLAYER PHYSICS — DRIFT + BOOST + WALL FIX + TIMER FIX */

function updatePlayer(dt){
  const forwardKey = keys['w'] || keys['arrowup'] || touchForward;
  const backKey    = keys['s'] || keys['arrowdown'];
  const leftKey    = keys['a'] || keys['arrowleft'] || touchLeft;
  const rightKey   = keys['d'] || keys['arrowright'] || touchRight;
  const boostKey   = keys['shift'] || touchBoost;

  // Throttle
  player.throttle = forwardKey ? 1 : backKey ? -1 : 0;

  // Steering
  let steerInput = 0;
  if(leftKey && !rightKey) steerInput = -1;
  else if(rightKey && !leftKey) steerInput = 1;

  player.steer = -steerInput;

  // BOOST
  const boosting = boostKey && player.boost > 0;

  if(boosting){
    player.boost -= dt * 0.25;
    if(player.boost < 0) player.boost = 0;
  } else {
    player.boost += dt * 0.12;
    if(player.boost > 1) player.boost = 1;
  }

  boostFill.style.width = (player.boost * 100) + "%";

  const boostFactor = 1 + (boosting ? 0.5 : 0);

  // ACCELERATION
  if(player.throttle !== 0){
    player.speed += player.throttle * player.accel * dt * boostFactor;
  } else {
    player.speed -= player.drag * dt * Math.sign(player.speed);
  }

  const maxFwd = player.maxSpeed * boostFactor;
  const maxRev = -player.maxSpeed * 0.35;

  player.speed = Math.min(maxFwd, Math.max(maxRev, player.speed));

  if(Math.abs(player.speed) < 0.001) player.speed = 0;

  // TURNING
  const speedNorm = Math.min(1, Math.abs(player.speed) / maxFwd);
  const turnRate = player.turnSpeed * (0.45 + 0.55 * speedNorm);

  player.heading += player.steer * turnRate * dt;

  const q = new THREE.Quaternion().setFromAxisAngle(
    new THREE.Vector3(0,1,0),
    player.heading
  );

  player.mesh.quaternion.slerp(q, Math.min(1, dt * 18));

  const forward = new THREE.Vector3(0,0,1).applyQuaternion(player.mesh.quaternion);

  // DRIFT
  const driftIntensity = Math.min(1, Math.abs(player.steer) * 1.4 * speedNorm);
  player.driftFactor += (driftIntensity - player.driftFactor) * Math.min(1, dt * 6);

  const lateral = new THREE.Vector3(-forward.z, 0, forward.x)
    .multiplyScalar(player.driftFactor * 0.8);

  const moveDir = forward.clone().add(lateral).normalize();

  player.pos.add(moveDir.multiplyScalar(player.speed * dt * 60));

  // WALL FIX
  for(const wall of stadiumWalls){
    resolveWallCollision(player, wall.position, 3.5);
  }

  // APPLY POSITION
  player.mesh.position.copy(player.pos);
  player.mesh.position.y = 0.5;

  // WHEEL ROTATION
  const wheelRot = player.speed * dt * 40;
  player.wheels.forEach(w => w.rotation.x -= wheelRot);

  // SKID MARKS
  const slip = Math.abs(player.speed) * Math.abs(player.steer);

  if(slip > 0.15 && Math.abs(player.speed) > 0.25){
    player.skidTimer += dt;

    if(player.skidTimer > 0.03){
      const rl = player.wheels[2].getWorldPosition(new THREE.Vector3());
      const rr = player.wheels[3].getWorldPosition(new THREE.Vector3());

      addSkid(rl);
      addSkid(rr);
      addSmoke(rl);
      addSmoke(rr);

      player.skidTimer = 0;
    }
  } else {
    player.skidTimer = 0;
  }

  // FUEL
  player.fuel = Math.max(0, player.fuel - dt * 0.01 * (0.3 + speedNorm));
  if(player.fuel <= 0) player.speed *= 0.98;

  damageFill.style.width = (player.damage * 100) + "%";
  fuelFill.style.width = (player.fuel * 100) + "%";

  updateCarDamageVisual(player);
  updateFlames(player, boosting, dt);
}

/* CAMERA */

let cameraLagPos = new THREE.Vector3();
let cameraShakeTimer = 0;
let cameraLagFactor = 2.5;

function applyCamera(dt){
  const maxFwd = player.maxSpeed * 1.4;
  const speedNorm = Math.min(1, Math.abs(player.speed) / maxFwd);

  const baseOffset = new THREE.Vector3(0, 4.2, -10 - 4 * speedNorm)
    .applyQuaternion(player.mesh.quaternion);

  const desired = player.mesh.position.clone().add(baseOffset);

  if(cameraLagPos.lengthSq() === 0)
    cameraLagPos.copy(desired);

  cameraLagPos.lerp(desired, Math.min(1, cameraLagFactor * dt));

  if(cameraShakeTimer > 0){
    cameraShakeTimer -= dt;
    const intensity = cameraShakeTimer * 4;

    cameraLagPos.x += (Math.random() - 0.5) * intensity;
    cameraLagPos.y += (Math.random() - 0.5) * intensity * 0.5;
    cameraLagPos.z += (Math.random() - 0.5) * intensity;
  }

  camera.position.copy(cameraLagPos);
  camera.lookAt(player.mesh.position.clone().add(new THREE.Vector3(0,0.6,0)));
}
/* ============================
      AI DRIVING LOGIC
============================ */

function updateAI(car, dt){
  // Follow spline
  car.tOnSpline += dt * (car.maxSpeed * 0.012);

  if(car.tOnSpline > 1) car.tOnSpline -= 1;

  const target = spline.getPointAt(car.tOnSpline);
  const dir = target.clone().sub(car.pos);
  const desiredHeading = Math.atan2(dir.x, dir.z);

  let diff = desiredHeading - car.heading;
  diff = Math.atan2(Math.sin(diff), Math.cos(diff));

  car.steer = THREE.MathUtils.clamp(diff * 2.2, -1, 1);

  // Throttle
  car.throttle = 1;

  // Speed control
  car.speed += car.accel * dt;
  if(car.speed > car.maxSpeed) car.speed = car.maxSpeed;

  // Movement
  const q = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), car.heading);
  const forward = new THREE.Vector3(0,0,1).applyQuaternion(q);

  car.heading += car.steer * car.turnSpeed * dt;

  car.pos.add(forward.multiplyScalar(car.speed * dt * 60));

  // Wall collision
  for(const wall of stadiumWalls){
    resolveWallCollision(car, wall.position, 3.5);
  }

  // Apply mesh
  car.mesh.position.copy(car.pos);
  car.mesh.position.y = 0.5;

  // Wheels
  const wheelRot = car.speed * dt * 40;
  car.wheels.forEach(w => w.rotation.x -= wheelRot);
}

/* ============================
      COP CHASE LOGIC
============================ */

function updateCop(car, dt){
  const target = player.pos.clone();

  const dir = target.clone().sub(car.pos);
  const desiredHeading = Math.atan2(dir.x, dir.z);

  let diff = desiredHeading - car.heading;
  diff = Math.atan2(Math.sin(diff), Math.cos(diff));

  car.steer = THREE.MathUtils.clamp(diff * 2.5, -1, 1);
  car.throttle = 1;

  // Speed
  car.speed += car.accel * dt;
  if(car.speed > car.maxSpeed) car.speed = car.maxSpeed;

  // Movement
  const q = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), car.heading);
  const forward = new THREE.Vector3(0,0,1).applyQuaternion(q);

  car.heading += car.steer * car.turnSpeed * dt;

  car.pos.add(forward.multiplyScalar(car.speed * dt * 60));

  // Collision
  for(const wall of stadiumWalls){
    resolveWallCollision(car, wall.position, 3.5);
  }

  // Apply mesh
  car.mesh.position.copy(car.pos);
  car.mesh.position.y = 0.5;

  // Wheels
  const wheelRot = car.speed * dt * 40;
  car.wheels.forEach(w => w.rotation.x -= wheelRot);
}

/* ============================
      CHECKPOINTS + LAPS
============================ */

let raceStarted = false;
let raceFinished = false;
let totalLaps = 3;
let sessionStartTime = 0;
let currentLapStartTime = 0;
let bestLap = null;

function checkCheckpoints(){
  if(!raceStarted || raceFinished) return;

  const pos = player.pos;
  const cp = checkpoints[player.lastCheckpoint];

  if(pos.distanceTo(cp.p) < 4){
    player.lastCheckpoint++;

    if(player.lastCheckpoint >= checkpoints.length){
      player.lastCheckpoint = 0;
      player.lap++;

      // Lap time
      const now = performance.now();
      const lapTime = (now - currentLapStartTime) / 1000;

      if(!bestLap || lapTime < bestLap) bestLap = lapTime;

      currentLapStartTime = now;

      if(player.lap >= totalLaps){
        finishRace();
      }
    }
  }
}

/* ============================
      RACE FINISH
============================ */

function finishRace(){
  raceFinished = true;
  running = false;

  bannerText.textContent = "FINISH!";
  bannerText.style.display = "block";

  setTimeout(() => {
    bannerText.style.display = "none";
  }, 2000);
}

/* ============================
      HUD UPDATE
============================ */

function updateHUD(){
  hudLap.textContent = `Lap: ${player.lap} / ${totalLaps}`;

  // Position
  let pos = 1;
  for(const ai of aiCars){
    if(ai.lap > player.lap) pos++;
    else if(ai.lap === player.lap){
      if(ai.lastCheckpoint > player.lastCheckpoint) pos++;
    }
  }

  hudPos.textContent = `Pos: ${pos} / ${aiCars.length + 1}`;
  hudSpeed.textContent = `Speed: ${Math.round(player.speed * 50)}`;

  if(bestLap)
    hudBest.textContent = `Best: ${bestLap.toFixed(3)}`;

  if(raceStarted && !raceFinished){
    const t = (performance.now() - sessionStartTime) / 1000;
    hudTimer.textContent = `Time: ${t.toFixed(3)}`;
  }
}

/* ============================
      MINIMAP
============================ */

const minimapCanvas = document.getElementById("minimapCanvas");
const minimapCtx = minimapCanvas.getContext("2d");

function drawMinimap(){
  minimapCanvas.width = 140;
  minimapCanvas.height = 140;

  const ctx = minimapCtx;
  ctx.clearRect(0,0,140,140);

  ctx.save();
  ctx.translate(70,70);
  ctx.scale(2.2,2.2);

  // Track
  ctx.strokeStyle = "#334155";
  ctx.lineWidth = 2;
  ctx.beginPath();

  for(let i=0;i<200;i++){
    const t = i/200;
    const p = spline.getPointAt(t);
    if(i===0) ctx.moveTo(p.x, p.z);
    else ctx.lineTo(p.x, p.z);
  }

  ctx.stroke();

  // Player
  ctx.fillStyle = "#22c55e";
  ctx.beginPath();
  ctx.arc(player.pos.x, player.pos.z, 2, 0, Math.PI*2);
  ctx.fill();

  // AI
  ctx.fillStyle = "#ef4444";
  aiCars.forEach(ai=>{
    ctx.beginPath();
    ctx.arc(ai.pos.x, ai.pos.z, 2, 0, Math.PI*2);
    ctx.fill();
  });

  // Cops
  ctx.fillStyle = "#3b82f6";
  cops.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.pos.x, c.pos.z, 2, 0, Math.PI*2);
    ctx.fill();
  });

  ctx.restore();
}

/* ============================
      RACE STATE MACHINE
============================ */

let running = false;
let countdownRunning = false;

function startCountdown(){
  countdownRunning = true;
  raceStarted = false;
  raceFinished = false;

  let step = 0;
  const lights = [l1,l2,l3,l4,l5];

  function tick(){
    if(step < 5){
      lights[step].classList.add("on");
      step++;
      setTimeout(tick, 700);
    } else {
      // GO!
      bannerText.textContent = "GO!";
      bannerText.style.display = "block";
      setTimeout(()=>bannerText.style.display="none",800);

      raceStarted = true;
      running = true;
      countdownRunning = false;

      // TIMER START FIX — start exactly at GO
      sessionStartTime = performance.now();
      currentLapStartTime = performance.now();
    }
  }

  tick();
}
/* ============================
      SMOKE + CRASH UPDATE
============================ */

function updateParticles(dt){
  // Smoke
  for(let i = smokeGroup.children.length - 1; i >= 0; i--){
    const s = smokeGroup.children[i];
    s.userData.life -= dt;
    s.position.y += dt * 1.2;
    s.material.opacity -= dt * 1.4;

    if(s.userData.life <= 0){
      smokeGroup.remove(s);
    }
  }

  // Crash sparks
  for(let i = crashGroup.children.length - 1; i >= 0; i--){
    const p = crashGroup.children[i];
    p.userData.life -= dt;
    p.position.add(p.userData.vel.clone().multiplyScalar(dt * 20));
    p.material.opacity -= dt * 2;

    if(p.userData.life <= 0){
      crashGroup.remove(p);
    }
  }
}

/* ============================
      RESET CARS
============================ */

function resetCars(){
  // Player
  player.pos.set(0,0,0);
  player.heading = 0;
  player.speed = 0;
  player.lap = 0;
  player.lastCheckpoint = 0;
  player.damage = 0;
  player.fuel = 1;
  player.boost = 1;

  player.mesh.position.set(0,0.5,0);
  player.mesh.rotation.set(0,0,0);

  // AI
  aiCars.forEach((ai,i)=>{
    ai.pos.copy(spline.getPointAt(i * 0.1));
    ai.heading = 0;
    ai.speed = 0;
    ai.lap = 0;
    ai.lastCheckpoint = 0;

    ai.mesh.position.copy(ai.pos);
    ai.mesh.position.y = 0.5;
  });

  // Cops
  cops.forEach((c,i)=>{
    c.pos.copy(spline.getPointAt(0.2 + i * 0.1));
    c.heading = 0;
    c.speed = 0;

    c.mesh.position.copy(c.pos);
    c.mesh.position.y = 0.5;
  });

  raceStarted = false;
  raceFinished = false;
  running = false;
}

/* ============================
      START BUTTON
============================ */

startBtn.onclick = () => {
  if(countdownRunning || running) return;
  resetCars();
  startCountdown();
};

/* ============================
      RESET BUTTON
============================ */

resetBtn.onclick = () => {
  resetCars();
};

/* ============================
      PAUSE BUTTON
============================ */

pauseBtn.onclick = () => {
  running = !running;
  pauseBtn.textContent = running ? "Pause" : "Resume";
};

/* ============================
      TRACK SELECT
============================ */

trackSelect.onchange = () => {
  const v = trackSelect.value;

  if(v === "classic") spline = buildClassic();
  if(v === "figure8") spline = buildFigure8();
  if(v === "oval") spline = buildOval();
  if(v === "city") spline = buildCity();

  buildRoad(spline);
  buildTrackWalls(spline);
  buildCenterSamples(spline);
  buildCheckpoints();
  buildCheckpointArrows();
};

/* ============================
      HOME SCREEN + GARAGE
============================ */

const homeScreen = document.getElementById("homeScreen");
const garage = document.getElementById("garage");
const changeCarBtn = document.getElementById("changeCarBtn");

let selectedCarType = "ferrari";

modeRaceBtn.onclick = () => {
  homeScreen.style.display = "none";
  garage.style.display = "flex";
};

modeTimeBtn.onclick = () => {
  homeScreen.style.display = "none";
  garage.style.display = "flex";
};

modeCopsBtn.onclick = () => {
  homeScreen.style.display = "none";
  garage.style.display = "flex";
};

changeCarBtn.onclick = () => {
  garage.style.display = "flex";
};

garageStartBtn.onclick = () => {
  garage.style.display = "none";
};

garageBackBtn.onclick = () => {
  garage.style.display = "none";
  homeScreen.style.display = "flex";
};

/* ============================
      MAIN GAME LOOP
============================ */

let lastTime = performance.now();

function loop(){
  requestAnimationFrame(loop);

  const now = performance.now();
  const dt = Math.min(0.033, (now - lastTime) / 1000);
  lastTime = now;

  if(running){
    updatePlayer(dt);

    aiCars.forEach(ai => updateAI(ai, dt));
    cops.forEach(c => updateCop(c, dt));

    checkCheckpoints();
  }

  updateParticles(dt);
  updateHUD();
  drawMinimap();
  updateCheckpointArrows(dt);
  updateRain(dt);
  updateDayNight(dt);

  applyCamera(dt);

  renderer.render(scene, camera);
}

loop();

/* ============================
      WINDOW RESIZE
============================ */

window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>
