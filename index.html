<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Racer – Balanced Steering</title>

<!-- Simple SVG favicon -->
<link rel="icon" type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='8' y='24' width='48' height='16' rx='4' ry='4' fill='%23ef4444'/%3E%3Crect x='18' y='18' width='28' height='10' rx='3' ry='3' fill='%23020617'/%3E%3Ccircle cx='20' cy='42' r='6' fill='%23020617'/%3E%3Ccircle cx='44' cy='42' r='6' fill='%23020617'/%3E%3C/svg%3E">

<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
<style>
  :root{
    --ui-bg: rgba(6,10,20,0.7);
    --muted: #cbd5e1;
  }
  html,body{margin:0;height:100%;background:#020617;color:#e5e7eb;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
  #canvas-wrap{position:fixed;inset:0;overflow:hidden}
  canvas{display:block;width:100%;height:100%}
  .topbar{position:fixed;left:12px;right:12px;top:12px;display:flex;flex-wrap:wrap;gap:8px;z-index:30}
  .panel{background:var(--ui-bg);backdrop-filter:blur(8px);padding:8px 10px;border-radius:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  label{font-size:12px;color:var(--muted)}
  select,button,input[type="color"]{
    background:rgba(15,23,42,0.9);
    border:1px solid rgba(148,163,184,0.5);
    color:#e5e7eb;
    padding:4px 8px;
    border-radius:6px;
    font-size:13px;
  }
  button{cursor:pointer}
  #hud{position:fixed;right:12px;top:12px;background:var(--ui-bg);backdrop-filter:blur(8px);padding:8px 10px;border-radius:10px;font-size:13px;z-index:30}
  #hud div{margin-bottom:2px}
  #hud div:last-child{margin-bottom:0}
  #controls{position:fixed;left:0;right:0;bottom:12px;display:flex;justify-content:center;gap:12px;pointer-events:none;z-index:30}
  .btn{width:72px;height:72px;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(15,23,42,0.95));color:#f9fafb;display:flex;align-items:center;justify-content:center;font-size:22px;pointer-events:auto;user-select:none;box-shadow:0 8px 20px rgba(0,0,0,0.45)}
  #btn-left{transform:translateX(-10px)} #btn-right{transform:translateX(10px)}
  #btn-forward{width:120px;border-radius:20px}
  #lights{position:fixed;top:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:40}
  .light{width:32px;height:32px;border-radius:50%;background:#1f2933;box-shadow:0 0 10px rgba(0,0,0,0.7);border:2px solid #111827}
  .light.on{background:#ef4444;box-shadow:0 0 18px #f97373}
  .banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:12px 18px;border-radius:999px;background:rgba(15,23,42,0.95);backdrop-filter:blur(10px);color:#f9fafb;font-size:18px;z-index:50;display:none}
  @media (max-width:640px){
    .topbar{flex-direction:column;align-items:flex-start}
  }
</style>
</head>
<body>
<div id="canvas-wrap"></div>

<div id="lights">
  <div class="light" id="l1"></div>
  <div class="light" id="l2"></div>
  <div class="light" id="l3"></div>
  <div class="light" id="l4"></div>
  <div class="light" id="l5"></div>
</div>

<div class="banner" id="bannerText">GO!</div>

<div class="topbar">
  <div class="panel">
    <label>Track</label>
    <select id="trackSelect">
      <option value="classic">Classic Loop</option>
      <option value="figure8">Figure Eight</option>
      <option value="stadium">Stadium</option>
    </select>
    <label>Car</label>
    <select id="carSelect">
      <option value="red">Red</option>
      <option value="blue">Blue</option>
      <option value="green">Green</option>
      <option value="yellow">Yellow</option>
    </select>
    <label>Color</label>
    <input id="colorPicker" type="color" value="#ff4d4d">
    <button id="startBtn">Start</button>
    <button id="pauseBtn">Pause</button>
    <button id="resetBtn">Reset</button>
    <button id="nightBtn">Night</button>
  </div>
  <div class="panel">
    <label>AI Cars</label>
    <select id="aiCount">
      <option value="1">1</option>
      <option value="2" selected>2</option>
      <option value="3">3</option>
      <option value="4">4</option>
    </select>
    <label>Laps</label>
    <select id="lapCount">
      <option value="1">1</option>
      <option value="3" selected>3</option>
      <option value="5">5</option>
    </select>
  </div>
</div>

<div id="hud">
  <div id="hudLap">Lap: 0 / 3</div>
  <div id="hudPos">Pos: 1 / 1</div>
  <div id="hudSpeed">Speed: 0</div>
</div>

<div id="controls">
  <div id="btn-left" class="btn">◀</div>
  <div id="btn-forward" class="btn">▲</div>
  <div id="btn-right" class="btn">▶</div>
</div>

<script>
const V3 = THREE.Vector3;
const Q = THREE.Quaternion;

/* Renderer / scene / camera */
const container = document.getElementById('canvas-wrap');
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7fb7ff);
scene.fog = new THREE.FogExp2(0x7fb7ff, 0.0007);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,6,14);

/* Lights */
const hemi = new THREE.HemisphereLight(0xffffff, 0x334155, 0.9);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(40,60,20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left = -80;
sun.shadow.camera.right = 80;
sun.shadow.camera.top = 80;
sun.shadow.camera.bottom = -80;
scene.add(sun);

/* Night headlights */
const headLightL = new THREE.SpotLight(0xffffff, 0, 20, Math.PI/6, 0.4, 1);
const headLightR = headLightL.clone();
headLightL.castShadow = true;
headLightR.castShadow = true;
scene.add(headLightL);
scene.add(headLightR);
let nightMode = false;

/* Ground & scenery */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(1000,1000),
  new THREE.MeshStandardMaterial({color:0x14532d, roughness:0.95})
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.02;
ground.receiveShadow = true;
scene.add(ground);

const hills = new THREE.Group();
for(let i=0;i<16;i++){
  const g = new THREE.Mesh(
    new THREE.ConeGeometry(10+Math.random()*20, 30+Math.random()*40, 8),
    new THREE.MeshStandardMaterial({color:0x166534})
  );
  g.position.set((Math.random()-0.5)*700, -4, -200 - Math.random()*500);
  g.rotation.y = Math.random()*Math.PI;
  hills.add(g);
}
scene.add(hills);

/* Track builders */
function makeSpline(points, closed=true){
  return new THREE.CatmullRomCurve3(points, closed, 'catmullrom', 0.5);
}
function buildClassic(){
  const pts = [
    new V3(0,0,0),
    new V3(20,0,-10),
    new V3(35,0,8),
    new V3(18,0,22),
    new V3(-10,0,18),
    new V3(-30,0,4),
    new V3(-18,0,-16),
    new V3(0,0,-22),
    new V3(20,0,-10)
  ];
  return makeSpline(pts,true);
}
function buildFigure8(){
  const pts = [];
  const r = 22;
  for(let i=0;i<20;i++){
    const a = i/20*Math.PI*2;
    const x = Math.cos(a)*r + Math.sin(a)*r*0.4;
    const z = Math.sin(a)*r;
    pts.push(new V3(x,0,z));
  }
  return makeSpline(pts,true);
}
function buildStadium(){
  const pts = [];
  const w = 30, h = 14;
  for(let i=0;i<32;i++){
    const a = i/32*Math.PI*2;
    const x = Math.cos(a)*w + Math.sin(a)*h*0.2;
    const z = Math.sin(a)*h + Math.cos(a)*w*0.1;
    pts.push(new V3(x,0,z));
  }
  return makeSpline(pts,true);
}

/* Road / walls / centerline */
let spline = buildClassic();
let roadMesh = null;
let wallsGroup = null;
let centerLine = null;
let centerSamples = [];
let checkpoints = [];
let startFinishMesh = null;
let startFinishT = 0;

function buildRoad(spline, width=7, segments=800){
  if(roadMesh) scene.remove(roadMesh);
  const positions = new Float32Array((segments+1)*2*3);
  const uvs = new Float32Array((segments+1)*2*2);
  const indices = new Uint32Array(segments*6);
  let pi=0, ui=0, ii=0;
  for(let i=0;i<=segments;i++){
    const t = i/segments;
    const p = spline.getPointAt(t);
    const tan = spline.getTangentAt(t).normalize();
    const bin = new V3().crossVectors(new V3(0,1,0), tan).normalize();
    const left = p.clone().add(bin.clone().multiplyScalar(-width*0.5));
    const right = p.clone().add(bin.clone().multiplyScalar(width*0.5));
    positions[pi++] = left.x; positions[pi++] = left.y+0.01; positions[pi++] = left.z;
    positions[pi++] = right.x; positions[pi++] = right.y+0.01; positions[pi++] = right.z;
    uvs[ui++] = t; uvs[ui++] = 0;
    uvs[ui++] = t; uvs[ui++] = 1;
    if(i<segments){
      const a = i*2, b = i*2+1, c = (i+1)*2, d = (i+1)*2+1;
      indices[ii++] = a; indices[ii++] = b; indices[ii++] = c;
      indices[ii++] = b; indices[ii++] = d; indices[ii++] = c;
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  geo.setAttribute('uv', new THREE.BufferAttribute(uvs,2));
  geo.setIndex(new THREE.BufferAttribute(indices,1));
  geo.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({
    color:0x111827,
    roughness:0.9,
    metalness:0.05
  });
  roadMesh = new THREE.Mesh(geo, mat);
  roadMesh.receiveShadow = true;
  scene.add(roadMesh);
}
function buildWalls(spline, width=7, samples=300){
  if(wallsGroup) scene.remove(wallsGroup);
  wallsGroup = new THREE.Group();
  const wallHeight = 1.2, wallThickness = 0.6;
  const len = spline.getLength();
  const segLen = len/samples;
  const mat = new THREE.MeshStandardMaterial({color:0x020617, roughness:0.4, metalness:0.2});
  for(let i=0;i<samples;i++){
    const t = i/samples;
    const p = spline.getPointAt(t);
    const tan = spline.getTangentAt(t).normalize();
    const bin = new V3().crossVectors(new V3(0,1,0), tan).normalize();
    const leftPos = p.clone().add(bin.clone().multiplyScalar(-width*0.5 - wallThickness*0.5));
    const rightPos = p.clone().add(bin.clone().multiplyScalar(width*0.5 + wallThickness*0.5));
    const wallGeo = new THREE.BoxGeometry(wallThickness, wallHeight, segLen*1.05);
    const leftWall = new THREE.Mesh(wallGeo, mat);
    leftWall.position.copy(leftPos); leftWall.position.y = wallHeight*0.5;
    leftWall.lookAt(p.clone().add(tan));
    leftWall.castShadow = true;
    wallsGroup.add(leftWall);
    const rightWall = leftWall.clone();
    rightWall.position.copy(rightPos); rightWall.position.y = wallHeight*0.5;
    wallsGroup.add(rightWall);
  }
  scene.add(wallsGroup);
}
function buildCenterLine(spline){
  if(centerLine) scene.remove(centerLine);
  const pts = [];
  const segs = 400;
  for(let i=0;i<=segs;i++){
    const p = spline.getPointAt(i/segs);
    pts.push(new V3(p.x, p.y+0.02, p.z));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineDashedMaterial({color:0xfacc15, dashSize:0.8, gapSize:0.8});
  centerLine = new THREE.Line(geo, mat);
  centerLine.computeLineDistances();
  scene.add(centerLine);
}
function buildCenterSamples(spline, count=1200){
  centerSamples = new Array(count);
  for(let i=0;i<count;i++){
    const t = i/count;
    centerSamples[i] = {t, p: spline.getPointAt(t)};
  }
}
function nearestCenterPoint(pos){
  let best = null, bestDist = Infinity, bestIdx = 0;
  const step = 4;
  for(let i=0;i<centerSamples.length;i+=step){
    const d = pos.distanceToSquared(centerSamples[i].p);
    if(d < bestDist){ bestDist = d; best = centerSamples[i]; bestIdx = i; }
  }
  const start = Math.max(0, bestIdx-24);
  const end = Math.min(centerSamples.length-1, bestIdx+24);
  for(let i=start;i<=end;i++){
    const d = pos.distanceToSquared(centerSamples[i].p);
    if(d < bestDist){ bestDist = d; best = centerSamples[i]; }
  }
  return {point: best.p.clone(), t: best.t};
}
function buildStartFinish(spline, t=0){
  if(startFinishMesh) scene.remove(startFinishMesh);
  startFinishT = t;
  const p = spline.getPointAt(t);
  const geo = new THREE.PlaneGeometry(2,7);
  const mat = new THREE.MeshBasicMaterial({color:0xffffff, side:THREE.DoubleSide});
  startFinishMesh = new THREE.Mesh(geo, mat);
  startFinishMesh.rotation.x = -Math.PI/2;
  startFinishMesh.position.copy(p);
  scene.add(startFinishMesh);
}
function buildCheckpoints(spline, count=12){
  checkpoints = [];
  for(let i=0;i<count;i++){
    const t = i/count;
    const p = spline.getPointAt(t);
    checkpoints.push({t, p});
  }
}

/* Car factory (with wheel refs) */
function makeCarMesh(color){
  const group = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(1.6,0.5,3),
    new THREE.MeshStandardMaterial({color, metalness:0.35, roughness:0.3})
  );
  body.position.y = 0.45;
  body.castShadow = true;
  group.add(body);
  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(1.1,0.45,1.2),
    new THREE.MeshStandardMaterial({color:0x020617, metalness:0.2, roughness:0.2})
  );
  cabin.position.set(0,0.85,-0.1);
  cabin.castShadow = true;
  group.add(cabin);
  const wheelGeo = new THREE.CylinderGeometry(0.35,0.35,0.4,16);
  wheelGeo.rotateZ(Math.PI/2);
  const wheelMat = new THREE.MeshStandardMaterial({color:0x020617});
  const offsets = [
    [0.9,0.25,1.05],[-0.9,0.25,1.05],
    [0.9,0.25,-1.05],[-0.9,0.25,-1.05]
  ];
  const wheels = [];
  offsets.forEach(o=>{
    const w = new THREE.Mesh(wheelGeo, wheelMat);
    w.position.set(o[0],o[1],o[2]);
    w.castShadow = true;
    group.add(w);
    wheels.push(w);
  });
  return {group, wheels};
}
function createCarState(mesh, wheels, opts){
  return {
    mesh,
    wheels,
    pos: new V3(),
    heading: 0,
    speed: 0,
    steer: 0,
    throttle: 0,
    maxSpeed: opts.maxSpeed || 1.0,
    accel: opts.accel || 1.2,
    brake: opts.brake || 2.4,
    drag: opts.drag || 1.6,
    baseGrip: opts.baseGrip || 6.0,
    turnSpeed: opts.turnSpeed || 3.0,
    ai: !!opts.ai,
    tOnSpline: opts.tOnSpline || 0,
    lap: 0,
    lastCheckpoint: 0,
    skidTimer: 0
  };
}

/* Skidmarks + smoke */
const skidGroup = new THREE.Group();
scene.add(skidGroup);
const smokeGroup = new THREE.Group();
scene.add(smokeGroup);

function addSkid(pos){
  const geo = new THREE.PlaneGeometry(0.12,0.6);
  const mat = new THREE.MeshBasicMaterial({color:0x111827, transparent:true, opacity:0.7, side:THREE.DoubleSide});
  const m = new THREE.Mesh(geo, mat);
  m.rotation.x = -Math.PI/2;
  m.position.copy(pos);
  m.position.y = 0.01;
  skidGroup.add(m);
  if(skidGroup.children.length>400){
    skidGroup.remove(skidGroup.children[0]);
  }
}
function addSmoke(pos){
  const geo = new THREE.SphereGeometry(0.12,8,8);
  const mat = new THREE.MeshBasicMaterial({color:0xd4d4d8, transparent:true, opacity:0.7});
  const m = new THREE.Mesh(geo, mat);
  m.position.copy(pos);
  m.position.y += 0.2;
  m.userData.life = 0.5;
  smokeGroup.add(m);
}

/* Cars */
let player = null;
let cpuCars = [];
let allCars = [];
const startT = 0.02;

function placeCarOnSpline(state, t, laneOffset=0){
  const center = spline.getPointAt(t);
  const tan = spline.getTangentAt(t).normalize();
  const forward = tan.clone().multiplyScalar(-1);
  const bin = new V3().crossVectors(new V3(0,1,0), tan).normalize();
  const pos = center.clone()
    .add(forward.multiplyScalar(4.0))
    .add(bin.multiplyScalar(laneOffset));
  state.pos.copy(pos);
  state.mesh.position.copy(pos);
  state.mesh.position.y = 0.5;
  state.heading = Math.atan2(-tan.x, tan.z);
  state.speed = 0;
  state.lap = 0;
  state.lastCheckpoint = 0;
  const q = new Q().setFromAxisAngle(new V3(0,1,0), state.heading);
  state.mesh.quaternion.copy(q);
}

/* Input */
const keys = {};
window.addEventListener('keydown', e=>{ keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()] = false; });

const btnLeft = document.getElementById('btn-left');
const btnRight = document.getElementById('btn-right');
const btnForward = document.getElementById('btn-forward');

let touchLeft = false;
let touchRight = false;
let touchForward = false;

function bindTouch(el, onStart, onEnd){
  el.addEventListener('touchstart', e=>{ e.preventDefault(); onStart(); }, {passive:false});
  el.addEventListener('touchend', e=>{ e.preventDefault(); onEnd(); }, {passive:false});
  el.addEventListener('mousedown', e=>{ onStart(); });
  el.addEventListener('mouseup', e=>{ onEnd(); });
  el.addEventListener('mouseleave', e=>{ onEnd(); });
}
bindTouch(btnLeft, ()=>touchLeft=true, ()=>touchLeft=false);
bindTouch(btnRight, ()=>touchRight=true, ()=>touchRight=false);
bindTouch(btnForward, ()=>touchForward=true, ()=>touchForward=false);

/* UI / race control */
const trackSelect = document.getElementById('trackSelect');
const carSelect = document.getElementById('carSelect');
const colorPicker = document.getElementById('colorPicker');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const resetBtn = document.getElementById('resetBtn');
const nightBtn = document.getElementById('nightBtn');
const aiCountSelect = document.getElementById('aiCount');
const lapCountSelect = document.getElementById('lapCount');
const hudLap = document.getElementById('hudLap');
const hudPos = document.getElementById('hudPos');
const hudSpeed = document.getElementById('hudSpeed');
const lights = [
  document.getElementById('l1'),
  document.getElementById('l2'),
  document.getElementById('l3'),
  document.getElementById('l4'),
  document.getElementById('l5')
];
const banner = document.getElementById('bannerText');

let lapTarget = 3;
let running = false;
let paused = false;
let countdownRunning = false;
let raceStarted = false;

function applyTrack(name){
  if(name==='classic') spline = buildClassic();
  else if(name==='figure8') spline = buildFigure8();
  else spline = buildStadium();
  buildRoad(spline);
  buildWalls(spline);
  buildCenterLine(spline);
  buildCenterSamples(spline);
  buildCheckpoints(spline, 12);
  buildStartFinish(spline, 0);
  resetCars();
}
function resetCars(){
  allCars.forEach(c=>scene.remove(c.mesh));
  allCars = []; cpuCars = [];
  const colorMap = {red:'#ef4444',blue:'#3b82f6',green:'#22c55e',yellow:'#eab308'};
  const baseColor = colorMap[carSelect.value] || '#ef4444';
  const {group:playerMesh,wheels:playerWheels} = makeCarMesh(baseColor);
  scene.add(playerMesh);
  player = createCarState(playerMesh, playerWheels,{
    maxSpeed:0.9,
    accel:1.4,
    brake:2.6,
    drag:1.7,
    baseGrip:6.0,
    turnSpeed:3.2
  });
  allCars.push(player);

  const aiCount = parseInt(aiCountSelect.value,10);
  const aiColors = ['#3b82f6','#22c55e','#eab308','#a855f7'];
  for(let i=0;i<aiCount;i++){
    const {group:wMesh,wheels:wWheels} = makeCarMesh(aiColors[i%aiColors.length]);
    scene.add(wMesh);
    const cs = createCarState(wMesh, wWheels,{
      ai:true,
      maxSpeed:0.45+Math.random()*0.1,
      accel:0.5+Math.random()*0.2,
      drag:1.4,
      baseGrip:5.0,
      turnSpeed:2.0,
      tOnSpline:startT
    });
    cpuCars.push(cs);
    allCars.push(cs);
  }

  placeCarOnSpline(player, startT, 0);
  const laneSpacing = 2.2;
  cpuCars.forEach((c,i)=>{
    const lane = (i%2===0 ? -1 : 1) * laneSpacing * (Math.floor(i/2)+1);
    placeCarOnSpline(c, startT, lane);
  });
}
function respawnPlayer(){
  const nearest = nearestCenterPoint(player.mesh.position);
  placeCarOnSpline(player, nearest.t, 0);
}

/* Countdown */
async function runCountdown(){
  if(countdownRunning) return;
  countdownRunning = true;
  raceStarted = false;
  running = false;
  paused = false;
  lights.forEach(l=>{l.classList.remove('on'); l.style.display='block';});
  banner.style.display='none';
  for(let i=0;i<5;i++){
    lights[i].classList.add('on');
    await new Promise(r=>setTimeout(r,700));
  }
  lights.forEach(l=>l.style.display='none');
  banner.textContent = 'GO!';
  banner.style.display='block';
  setTimeout(()=>banner.style.display='none',800);
  raceStarted = true;
  running = true;
  countdownRunning = false;
}

/* UI events */
trackSelect.addEventListener('change', ()=>applyTrack(trackSelect.value));
aiCountSelect.addEventListener('change', ()=>applyTrack(trackSelect.value));
lapCountSelect.addEventListener('change', ()=>{
  lapTarget = parseInt(lapCountSelect.value,10);
  hudLap.textContent = `Lap: ${player.lap} / ${lapTarget}`;
});
colorPicker.addEventListener('input', ()=>{
  if(player){
    player.mesh.traverse(m=>{ if(m.material && m.material.color) m.material.color.set(colorPicker.value); });
  }
});
startBtn.addEventListener('click', ()=>{ runCountdown(); });
pauseBtn.addEventListener('click', ()=>{ if(!raceStarted) return; paused = !paused; pauseBtn.textContent = paused?'Resume':'Pause'; });
resetBtn.addEventListener('click', ()=>{ applyTrack(trackSelect.value); raceStarted=false; running=false; paused=false; });
nightBtn.addEventListener('click', ()=>{
  nightMode = !nightMode;
  if(nightMode){
    scene.background.set(0x020617);
    scene.fog.color.set(0x020617);
    hemi.intensity = 0.15;
    sun.intensity = 0.25;
    headLightL.intensity = 2.2;
    headLightR.intensity = 2.2;
    nightBtn.textContent = 'Day';
  }else{
    scene.background.set(0x7fb7ff);
    scene.fog.color.set(0x7fb7ff);
    hemi.intensity = 0.9;
    sun.intensity = 1.0;
    headLightL.intensity = 0;
    headLightR.intensity = 0;
    nightBtn.textContent = 'Night';
  }
});

/* Physics & AI – BALANCED STEERING */
function updatePlayer(dt){
  const forwardKey = keys['w'] || keys['arrowup'] || touchForward;
  const backKey    = keys['s'] || keys['arrowdown'];
  const leftKey    = keys['a'] || keys['arrowleft'] || touchLeft;
  const rightKey   = keys['d'] || keys['arrowright'] || touchRight;

  player.throttle = forwardKey ? 1 : backKey ? -1 : 0;

  if (leftKey && !rightKey) player.steer = -1;
  else if (rightKey && !leftKey) player.steer = 1;
  else player.steer = 0;

  if (player.throttle !== 0) {
    player.speed += player.throttle * player.accel * dt;
  } else {
    player.speed *= 0.96;
  }

  player.speed = Math.max(-player.maxSpeed * 0.4, Math.min(player.maxSpeed, player.speed));

  const speedNorm = Math.min(1, Math.abs(player.speed) / player.maxSpeed);
  const grip = player.baseGrip * (0.65 + 0.35 * (1 - speedNorm));
  const steerStrength = player.steer * player.turnSpeed * (0.5 + 0.5 * speedNorm);

  player.heading += steerStrength * dt;

  const forward = new V3(Math.sin(player.heading),0,-Math.cos(player.heading));
  player.pos.add(forward.multiplyScalar(player.speed * dt * 60));

  const nearest = nearestCenterPoint(player.pos);
  const center = nearest.point;
  const tan = spline.getTangentAt(nearest.t).normalize();
  const bin = new V3().crossVectors(new V3(0,1,0), tan).normalize();
  const lateral = player.pos.clone().sub(center).dot(bin);
  const halfRoad = 7*0.5 - 0.4;

  if(Math.abs(lateral) > halfRoad){
    const push = (Math.abs(lateral) - halfRoad);
    const dir = lateral > 0 ? -1 : 1;
    player.pos.add(bin.clone().multiplyScalar(dir*push));
    player.speed *= 0.35;
  } else {
    player.pos.add(bin.clone().multiplyScalar(-lateral * 0.02 * dt * grip));
  }

  player.mesh.position.copy(player.pos);
  player.mesh.position.y = 0.5 + Math.sin(performance.now()*0.005)*0.03;
  const targetQ = new Q().setFromAxisAngle(new V3(0,1,0), player.heading);
  player.mesh.quaternion.slerp(targetQ, Math.min(1, 10*dt));

  const wheelRot = player.speed * dt * 40;
  player.wheels.forEach(w=>{ w.rotation.x -= wheelRot; });

  const slip = Math.abs(lateral) * speedNorm;
  if(slip > 0.4 && Math.abs(player.speed) > 0.3){
    player.skidTimer += dt;
    if(player.skidTimer > 0.03){
      const rearLeft = player.wheels[2].getWorldPosition(new V3());
      const rearRight = player.wheels[3].getWorldPosition(new V3());
      addSkid(rearLeft);
      addSkid(rearRight);
      addSmoke(rearLeft);
      addSmoke(rearRight);
      player.skidTimer = 0;
    }
  }else{
    player.skidTimer = 0;
  }

  handleCheckpoints(player, nearest.t);
}
function updateAI(dt){
  const len = spline.getLength();
  for(const c of cpuCars){
    const lookAhead = 0.02;
    const futureT = (c.tOnSpline + lookAhead) % 1;
    const curTan = spline.getTangentAt(c.tOnSpline).normalize();
    const futTan = spline.getTangentAt(futureT).normalize();
    const angleDiff = Math.acos(Math.max(-1, Math.min(1, curTan.dot(futTan))));
    const curvatureFactor = 1 - Math.min(1, angleDiff*6);
    const targetSpeed = c.maxSpeed * (0.6 + 0.4*curvatureFactor);
    if(c.speed < targetSpeed) c.speed += c.accel * dt * 0.8;
    else c.speed -= c.accel * dt * 0.6;
    c.speed = Math.max(0.1, Math.min(c.maxSpeed, c.speed));
    const advance = (c.speed * dt * 60)/len;
    c.tOnSpline = (c.tOnSpline + advance) % 1;
    const center = spline.getPointAt(c.tOnSpline);
    const tan = spline.getTangentAt(c.tOnSpline).normalize();
    const forward = tan.clone().multiplyScalar(-1);
    c.pos.copy(center.clone().add(forward.multiplyScalar(4.0)));
    c.mesh.position.copy(c.pos);
    c.mesh.position.y = 0.5;
    c.mesh.lookAt(center.x, center.y, center.z);
    const wheelRot = c.speed * dt * 40;
    c.wheels.forEach(w=>{ w.rotation.x -= wheelRot; });
    handleCheckpoints(c, c.tOnSpline);
  }
}
function handleCheckpoints(car, t){
  let nearestIdx = car.lastCheckpoint;
  let bestDist = Infinity;
  for(let i=0;i<checkpoints.length;i++){
    const d = car.mesh.position.distanceToSquared(checkpoints[i].p);
    if(d < bestDist){ bestDist = d; nearestIdx = i; }
  }
  if(nearestIdx !== car.lastCheckpoint){
    const expected = (car.lastCheckpoint + 1) % checkpoints.length;
    if(nearestIdx === expected){
      car.lastCheckpoint = nearestIdx;
      if(nearestIdx === 0){
        car.lap++;
        if(car === player && car.lap >= lapTarget){
          running = false;
          banner.textContent = 'FINISHED!';
          banner.style.display = 'block';
          setTimeout(()=>banner.style.display='none',2000);
        }
      }
    }
  }
}

/* Smoke update */
function updateSmoke(dt){
  for(let i=smokeGroup.children.length-1;i>=0;i--){
    const s = smokeGroup.children[i];
    s.userData.life -= dt;
    s.position.y += dt*0.6;
    s.material.opacity = Math.max(0, s.userData.life*1.4);
    if(s.userData.life<=0){
      smokeGroup.remove(s);
    }
  }
}

/* Main loop */
let lastTime = performance.now();
function loop(){
  const now = performance.now();
  const dt = Math.min(0.05, (now-lastTime)/1000);
  lastTime = now;

  if(running && !paused && raceStarted){
    updatePlayer(dt);
    updateAI(dt);
  }
  updateSmoke(dt);

  const camOffset = new V3(0,4.2,10).applyQuaternion(player.mesh.quaternion);
  const desiredCam = player.mesh.position.clone().add(camOffset);
  camera.position.lerp(desiredCam, Math.min(1, 6*dt));
  camera.lookAt(player.mesh.position.clone().add(new V3(0,0.6,0)));

  if(nightMode){
    const dir = new V3(Math.sin(player.heading),0,-Math.cos(player.heading));
    const leftPos = player.wheels[2].getWorldPosition(new V3());
    const rightPos = player.wheels[3].getWorldPosition(new V3());
    headLightL.position.copy(leftPos).add(new V3(0,0.2,0));
    headLightR.position.copy(rightPos).add(new V3(0,0.2,0));
    headLightL.target.position.copy(leftPos.clone().add(dir.clone().multiplyScalar(10)));
    headLightR.target.position.copy(rightPos.clone().add(dir.clone().multiplyScalar(10)));
    scene.add(headLightL.target);
    scene.add(headLightR.target);
  }

  hudLap.textContent = `Lap: ${player.lap} / ${lapTarget}`;
  const standings = allCars.map(c=>{
    const t = c.ai ? c.tOnSpline : nearestCenterPoint(c.mesh.position).t;
    return {c, progress: c.lap + t};
  }).sort((a,b)=>b.progress - a.progress);
  const pos = standings.findIndex(s=>s.c===player)+1;
  hudPos.textContent = `Pos: ${pos} / ${allCars.length}`;
  hudSpeed.textContent = `Speed: ${(player.speed*60).toFixed(1)}`;

  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}

/* Init */
applyTrack('classic');
lapTarget = parseInt(lapCountSelect.value,10);
hudLap.textContent = `Lap: ${player.lap} / ${lapTarget}`;
requestAnimationFrame(loop);

/* Resize */
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* Debug */
window.__racer = {scene, camera, spline, player, cpuCars, allCars};
</script>
