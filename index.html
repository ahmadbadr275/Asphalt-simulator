<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Racer – Big Build</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>

<style>
  :root{
    --ui-bg: rgba(6,10,20,0.78);
    --muted: #cbd5e1;
    --accent: #22c55e;
  }
  html,body{
    margin:0;
    height:100%;
    background:#020617;
    color:#e5e7eb;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    overflow:hidden;
  }
  #canvas-wrap{
    position:fixed;
    inset:0;
    overflow:hidden;
  }
  canvas{display:block;width:100%;height:100%}

  .topbar{
    position:fixed;
    left:12px;
    right:12px;
    top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    z-index:30;
  }
  .panel{
    background:var(--ui-bg);
    backdrop-filter:blur(10px);
    padding:8px 10px;
    border-radius:12px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
  }
  label{
    font-size:11px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.06em;
  }
  select,button,input[type="color"]{
    background:rgba(15,23,42,0.95);
    border:1px solid rgba(148,163,184,0.6);
    color:#e5e7eb;
    padding:4px 8px;
    border-radius:6px;
    font-size:12px;
  }
  button{cursor:pointer}
  button.primary{
    border-color:var(--accent);
    color:var(--accent);
  }

  #hud{
    position:fixed;
    right:12px;
    top:10px;
    background:var(--ui-bg);
    backdrop-filter:blur(10px);
    padding:8px 10px;
    border-radius:12px;
    font-size:12px;
    z-index:30;
    min-width:120px;
  }
  #hud div{margin-bottom:2px}
  #hud div:last-child{margin-bottom:0}

  #controls{
    position:fixed;
    left:0;
    right:0;
    bottom:12px;
    display:flex;
    justify-content:center;
    gap:12px;
    pointer-events:none;
    z-index:30;
  }
  .btn{
    width:72px;
    height:72px;
    border-radius:16px;
    background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(15,23,42,0.95));
    color:#f9fafb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    pointer-events:auto;
    user-select:none;
    box-shadow:0 8px 20px rgba(0,0,0,0.45);
  }
  #btn-left{transform:translateX(-10px)}
  #btn-right{transform:translateX(10px)}
  #btn-forward{width:120px;border-radius:20px}

  #lights{
    position:fixed;
    top:22px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    z-index:40;
  }
  .light{
    width:32px;
    height:32px;
    border-radius:50%;
    background:#1f2933;
    box-shadow:0 0 10px rgba(0,0,0,0.7);
    border:2px solid #111827;
  }
  .light.on{
    background:#ef4444;
    box-shadow:0 0 18px #f97373;
  }

  .banner{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:12px 18px;
    border-radius:999px;
    background:rgba(15,23,42,0.96);
    backdrop-filter:blur(12px);
    color:#f9fafb;
    font-size:20px;
    z-index:50;
    display:none;
  }

  #miniMapWrap{
    position:fixed;
    left:12px;
    bottom:12px;
    width:150px;
    height:150px;
    border-radius:999px;
    background:rgba(15,23,42,0.9);
    box-shadow:0 8px 20px rgba(0,0,0,0.6);
    overflow:hidden;
    z-index:25;
  }
  #miniMapCanvas{
    width:100%;
    height:100%;
    display:block;
  }

  #speedo{
    position:fixed;
    right:12px;
    bottom:12px;
    width:150px;
    height:150px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%,#1f2937,#020617);
    box-shadow:0 8px 20px rgba(0,0,0,0.6);
    z-index:25;
  }
  #speedo svg{
    width:100%;
    height:100%;
  }

  #garage{
    position:fixed;
    inset:0;
    background:rgba(15,23,42,0.92);
    backdrop-filter:blur(18px);
    display:none;
    z-index:60;
    color:#e5e7eb;
  }
  #garage-inner{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    max-width:520px;
    width:90%;
    background:rgba(15,23,42,0.98);
    border-radius:18px;
    padding:16px 18px 14px;
    box-shadow:0 18px 40px rgba(0,0,0,0.7);
  }
  #garage h2{
    margin:0 0 8px;
    font-size:18px;
  }
  #garage p{
    margin:0 0 10px;
    font-size:13px;
    color:var(--muted);
  }
  .stat-row{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    margin-bottom:4px;
  }
  .stat-bar{
    height:6px;
    border-radius:999px;
    background:#020617;
    overflow:hidden;
  }
  .stat-bar span{
    display:block;
    height:100%;
    background:linear-gradient(90deg,#22c55e,#a3e635);
  }
  #garage-footer{
    display:flex;
    justify-content:flex-end;
    margin-top:10px;
    gap:8px;
  }

  #trackThumbs{
    display:flex;
    gap:6px;
    margin-top:6px;
  }
  .thumb{
    flex:1;
    height:40px;
    border-radius:10px;
    background:#020617;
    border:1px solid rgba(148,163,184,0.6);
    position:relative;
    cursor:pointer;
    overflow:hidden;
  }
  .thumb span{
    position:absolute;
    left:6px;
    bottom:4px;
    font-size:10px;
    color:#e5e7eb;
    text-shadow:0 1px 2px #000;
  }
  .thumb.active{
    border-color:var(--accent);
    box-shadow:0 0 0 1px rgba(34,197,94,0.6);
  }

  #lapTimes{
    margin-top:4px;
    font-size:11px;
    color:var(--muted);
  }

  #replayHint{
    position:fixed;
    left:50%;
    bottom:40px;
    transform:translateX(-50%);
    padding:4px 10px;
    border-radius:999px;
    background:rgba(15,23,42,0.9);
    font-size:11px;
    color:#e5e7eb;
    z-index:40;
  }

  @media (max-width:640px){
    .topbar{flex-direction:column;align-items:flex-start}
    #miniMapWrap,#speedo{width:120px;height:120px}
  }
</style>
</head>
<body>
<div id="canvas-wrap"></div>

<div id="lights">
  <div class="light" id="l1"></div>
  <div class="light" id="l2"></div>
  <div class="light" id="l3"></div>
  <div class="light" id="l4"></div>
  <div class="light" id="l5"></div>
</div>

<div class="banner" id="bannerText">GO!</div>

<div class="topbar">
  <div class="panel">
    <label>Track</label>
    <select id="trackSelect">
      <option value="classic">Classic Loop</option>
      <option value="figure8">Figure Eight</option>
      <option value="stadium">Stadium</option>
    </select>
    <label>Car</label>
    <select id="carSelect">
      <option value="sprinter">Sprinter</option>
      <option value="grip">Gripster</option>
      <option value="drift">Drifter</option>
    </select>
    <label>Color</label>
    <input id="colorPicker" type="color" value="#ff4d4d">
    <button id="garageBtn">Garage</button>
  </div>
  <div class="panel">
    <label>AI</label>
    <select id="aiCount">
      <option value="1">1</option>
      <option value="2" selected>2</option>
      <option value="3">3</option>
      <option value="4">4</option>
    </select>
    <label>Laps</label>
    <select id="lapCount">
      <option value="1">1</option>
      <option value="3" selected>3</option>
      <option value="5">5</option>
    </select>
    <label>Tilt</label>
    <select id="tiltMode">
      <option value="off" selected>Off</option>
      <option value="on">On</option>
    </select>
    <button id="startBtn" class="primary">Start</button>
    <button id="pauseBtn">Pause</button>
    <button id="resetBtn">Reset</button>
    <button id="nightBtn">Night</button>
  </div>
</div>

<div id="hud">
  <div id="hudLap">Lap: 0 / 3</div>
  <div id="hudPos">Pos: 1 / 1</div>
  <div id="hudSpeed">Speed: 0</div>
  <div id="hudTime">Lap: 0.000</div>
  <div id="hudBest">Best: --</div>
</div>

<div id="miniMapWrap">
  <canvas id="miniMapCanvas" width="200" height="200"></canvas>
</div>

<div id="speedo">
  <svg viewBox="0 0 100 100">
    <defs>
      <linearGradient id="gradArc" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#22c55e"/>
        <stop offset="100%" stop-color="#f97316"/>
      </linearGradient>
    </defs>
    <circle cx="50" cy="50" r="46" fill="#020617" stroke="#111827" stroke-width="2"/>
    <path d="M15 60 A35 35 0 0 1 85 60" fill="none" stroke="url(#gradArc)" stroke-width="4" stroke-linecap="round"/>
    <line id="needle" x1="50" y1="50" x2="50" y2="18" stroke="#e5e7eb" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="50" cy="50" r="3" fill="#e5e7eb"/>
    <text x="50" y="72" text-anchor="middle" fill="#9ca3af" font-size="7">km/h</text>
  </svg>
</div>

<div id="controls">
  <div id="btn-left" class="btn">◀</div>
  <div id="btn-forward" class="btn">▲</div>
  <div id="btn-right" class="btn">▶</div>
</div>

<div id="garage">
  <div id="garage-inner">
    <h2>Garage</h2>
    <p>Tune your car choice and see stats. These affect acceleration, grip and top speed.</p>
    <div id="garageStats"></div>
    <div id="trackThumbs">
      <div class="thumb" data-track="classic">
        <span>Classic</span>
      </div>
      <div class="thumb" data-track="figure8">
        <span>Figure 8</span>
      </div>
      <div class="thumb" data-track="stadium">
        <span>Stadium</span>
      </div>
    </div>
    <div id="lapTimes"></div>
    <div id="garage-footer">
      <button id="garageClose">Close</button>
    </div>
  </div>
</div>

<div id="replayHint">Press R to toggle replay of last lap</div>

<div id="controlsTouch"></div>

<div id="lightsOverlay"></div>

<div id="controlsButtons"></div>

<div id="controlsMobile"></div>

<div id="controlsExtra"></div>

<div id="controlsBottom"></div>

<div id="controlsOverlay"></div>

<div id="controlsUI"></div>

<div id="controlsExtra2"></div>

<div id="controlsExtra3"></div>

<div id="controlsExtra4"></div>

<div id="controlsExtra5"></div>

<div id="controlsExtra6"></div>

<div id="controlsExtra7"></div>

<div id="controlsExtra8"></div>

<div id="controlsExtra9"></div>

<div id="controlsExtra10"></div>

<script>
const V3 = THREE.Vector3;
const Q = THREE.Quaternion;

/* Renderer / scene / camera */
const container = document.getElementById('canvas-wrap');
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.autoClear = false;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7fb7ff);
scene.fog = new THREE.FogExp2(0x7fb7ff, 0.0007);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,6,14);

/* Lights */
const hemi = new THREE.HemisphereLight(0xffffff, 0x334155, 0.9);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(40,60,20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left = -80;
sun.shadow.camera.right = 80;
sun.shadow.camera.top = 80;
sun.shadow.camera.bottom = -80;
scene.add(sun);

/* Night headlights */
const headLightL = new THREE.SpotLight(0xffffff, 0, 20, Math.PI/6, 0.4, 1);
const headLightR = headLightL.clone();
headLightL.castShadow = true;
headLightR.castShadow = true;
scene.add(headLightL);
scene.add(headLightR);
let nightMode = false;

/* Ground & scenery */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(1000,1000),
  new THREE.MeshStandardMaterial({color:0x14532d, roughness:0.95})
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.02;
ground.receiveShadow = true;
scene.add(ground);

const hills = new THREE.Group();
for(let i=0;i<18;i++){
  const g = new THREE.Mesh(
    new THREE.ConeGeometry(10+Math.random()*20, 30+Math.random()*40, 8),
    new THREE.MeshStandardMaterial({color:0x166534})
  );
  g.position.set((Math.random()-0.5)*700, -4, -200 - Math.random()*500);
  g.rotation.y = Math.random()*Math.PI;
  hills.add(g);
}
scene.add(hills);

/* Track builders */
function makeSpline(points, closed=true){
  return new THREE.CatmullRomCurve3(points, closed, 'catmullrom', 0.5);
}
function buildClassic(){
  const pts = [
    new V3(0,0,0),
    new V3(20,0,-10),
    new V3(35,0,8),
    new V3(18,0,22),
    new V3(-10,0,18),
    new V3(-30,0,4),
    new V3(-18,0,-16),
    new V3(0,0,-22),
    new V3(20,0,-10)
  ];
  return makeSpline(pts,true);
}
function buildFigure8(){
  const pts = [];
  const r = 22;
  for(let i=0;i<20;i++){
    const a = i/20*Math.PI*2;
    const x = Math.cos(a)*r + Math.sin(a)*r*0.4;
    const z = Math.sin(a)*r;
    pts.push(new V3(x,0,z));
  }
  return makeSpline(pts,true);
}
function buildStadium(){
  const pts = [];
  const w = 30, h = 14;
  for(let i=0;i<32;i++){
    const a = i/32*Math.PI*2;
    const x = Math.cos(a)*w + Math.sin(a)*h*0.2;
    const z = Math.sin(a)*h + Math.cos(a)*w*0.1;
    pts.push(new V3(x,0,z));
  }
  return makeSpline(pts,true);
}

/* Road / walls / centerline / ghost line */
let spline = buildClassic();
let roadMesh = null;
let wallsGroup = null;
let centerLine = null;
let centerSamples = [];
let checkpoints = [];
let startFinishMesh = null;
let startFinishT = 0;
let ghostLine = null;
let ghostPath = [];

function buildRoad(spline, width=7, segments=800){
  if(roadMesh) scene.remove(roadMesh);
  const positions = new Float32Array((segments+1)*2*3);
  const uvs = new Float32Array((segments+1)*2*2);
  const indices = new Uint32Array(segments*6);
  let pi=0, ui=0, ii=0;
  for(let i=0;i<=segments;i++){
    const t = i/segments;
    const p = spline.getPointAt(t);
    const tan = spline.getTangentAt(t).normalize();
    const bin = new V3().crossVectors(new V3(0,1,0), tan).normalize();
    const left = p.clone().add(bin.clone().multiplyScalar(-width*0.5));
    const right = p.clone().add(bin.clone().multiplyScalar(width*0.5));
    positions[pi++] = left.x; positions[pi++] = left.y+0.01; positions[pi++] = left.z;
    positions[pi++] = right.x; positions[pi++] = right.y+0.01; positions[pi++] = right.z;
    uvs[ui++] = t; uvs[ui++] = 0;
    uvs[ui++] = t; uvs[ui++] = 1;
    if(i<segments){
      const a = i*2, b = i*2+1, c = (i+1)*2, d = (i+1)*2+1;
      indices[ii++] = a; indices[ii++] = b; indices[ii++] = c;
      indices[ii++] = b; indices[ii++] = d; indices[ii++] = c;
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  geo.setAttribute('uv', new THREE.BufferAttribute(uvs,2));
  geo.setIndex(new THREE.BufferAttribute(indices,1));
  geo.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({
    color:0x111827,
    roughness:0.9,
    metalness:0.05
  });
  roadMesh = new THREE.Mesh(geo, mat);
  roadMesh.receiveShadow = true;
  scene.add(roadMesh);
}
function buildWalls(spline, width=7, samples=260){
  if(wallsGroup) scene.remove(wallsGroup);
  wallsGroup = new THREE.Group();
  const wallHeight = 1.2, wallThickness = 0.6;
  const len = spline.getLength();
  const segLen = len/samples;
  const mat = new THREE.MeshStandardMaterial({color:0x020617, roughness:0.4, metalness:0.2});
  for(let i=0;i<samples;i++){
    const t = i/samples;
    const p = spline.getPointAt(t);
    const tan = spline.getTangentAt(t).normalize();
    const bin = new V3().crossVectors(new V3(0,1,0), tan).normalize();
    const leftPos = p.clone().add(bin.clone().multiplyScalar(-width*0.5 - wallThickness*0.5));
    const rightPos = p.clone().add(bin.clone().multiplyScalar(width*0.5 + wallThickness*0.5));
    const wallGeo = new THREE.BoxGeometry(wallThickness, wallHeight, segLen*1.05);
    const leftWall = new THREE.Mesh(wallGeo, mat);
    leftWall.position.copy(leftPos); leftWall.position.y = wallHeight*0.5;
    leftWall.lookAt(p.clone().add(tan));
    leftWall.castShadow = true;
    wallsGroup.add(leftWall);
    const rightWall = leftWall.clone();
    rightWall.position.copy(rightPos); rightWall.position.y = wallHeight*0.5;
    wallsGroup.add(rightWall);
  }
  scene.add(wallsGroup);
}
function buildCenterLine(spline){
  if(centerLine) scene.remove(centerLine);
  const pts = [];
  const segs = 400;
  for(let i=0;i<=segs;i++){
    const p = spline.getPointAt(i/segs);
    pts.push(new V3(p.x, p.y+0.02, p.z));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineDashedMaterial({color:0xfacc15, dashSize:0.8, gapSize:0.8});
  centerLine = new THREE.Line(geo, mat);
  centerLine.computeLineDistances();
  scene.add(centerLine);
}
function buildCenterSamples(spline, count=1200){
  centerSamples = new Array(count);
  for(let i=0;i<count;i++){
    const t = i/count;
    centerSamples[i] = {t, p: spline.getPointAt(t)};
  }
}
function nearestCenterPoint(pos){
  let best = null, bestDist = Infinity, bestIdx = 0;
  const step = 4;
  for(let i=0;i<centerSamples.length;i+=step){
    const d = pos.distanceToSquared(centerSamples[i].p);
    if(d < bestDist){ bestDist = d; best = centerSamples[i]; bestIdx = i; }
  }
  const start = Math.max(0, bestIdx-24);
  const end = Math.min(centerSamples.length-1, bestIdx+24);
  for(let i=start;i<=end;i++){
    const d = pos.distanceToSquared(centerSamples[i].p);
    if(d < bestDist){ bestDist = d; best = centerSamples[i]; }
  }
  return {point: best.p.clone(), t: best.t};
}
function buildStartFinish(spline, t=0){
  if(startFinishMesh) scene.remove(startFinishMesh);
  startFinishT = t;
  const p = spline.getPointAt(t);
  const geo = new THREE.PlaneGeometry(2,7);
  const mat = new THREE.MeshBasicMaterial({color:0xffffff, side:THREE.DoubleSide});
  startFinishMesh = new THREE.Mesh(geo, mat);
  startFinishMesh.rotation.x = -Math.PI/2;
  startFinishMesh.position.copy(p);
  scene.add(startFinishMesh);
}
function buildCheckpoints(spline, count=12){
  checkpoints = [];
  for(let i=0;i<count;i++){
    const t = i/count;
    const p = spline.getPointAt(t);
    checkpoints.push({t, p});
  }
}
function buildGhostLine(){
  if(ghostLine) scene.remove(ghostLine);
  if(ghostPath.length<2) return;
  const pts = ghostPath.map(p=>new V3(p.x, p.y+0.03, p.z));
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({color:0x22c55e, transparent:true, opacity:0.6});
  ghostLine = new THREE.Line(geo, mat);
  scene.add(ghostLine);
}

/* Car factory (front/rear visible) */
function makeCarMesh(color){
  const group = new THREE.Group();

  const chassis = new THREE.Mesh(
    new THREE.BoxGeometry(1.7,0.45,3.2),
    new THREE.MeshStandardMaterial({color, metalness:0.4, roughness:0.3})
  );
  chassis.position.y = 0.45;
  chassis.castShadow = true;
  group.add(chassis);

  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(1.2,0.55,1.4),
    new THREE.MeshStandardMaterial({color:0x020617, metalness:0.3, roughness:0.2})
  );
  cabin.position.set(0,0.9,-0.1);
  cabin.castShadow = true;
  group.add(cabin);

  const spoiler = new THREE.Mesh(
    new THREE.BoxGeometry(1.4,0.12,0.4),
    new THREE.MeshStandardMaterial({color:0x111827, metalness:0.4, roughness:0.4})
  );
  spoiler.position.set(0,0.9,1.4);
  group.add(spoiler);

  const frontStrip = new THREE.Mesh(
    new THREE.BoxGeometry(1.4,0.18,0.12),
    new THREE.MeshStandardMaterial({color:0xf97316, emissive:0xf97316, emissiveIntensity:0.7})
  );
  frontStrip.position.set(0,0.4,-1.7);
  group.add(frontStrip);

  const rearStrip = new THREE.Mesh(
    new THREE.BoxGeometry(1.4,0.18,0.12),
    new THREE.MeshStandardMaterial({color:0xef4444, emissive:0xef4444, emissiveIntensity:0.9})
  );
  rearStrip.position.set(0,0.4,1.7);
  group.add(rearStrip);

  const wheelGeo = new THREE.CylinderGeometry(0.35,0.35,0.4,16);
  wheelGeo.rotateZ(Math.PI/2);
  const wheelMat = new THREE.MeshStandardMaterial({color:0x020617, metalness:0.2, roughness:0.6});
  const offsets = [
    [0.9,0.25,1.15],[-0.9,0.25,1.15],
    [0.9,0.25,-1.15],[-0.9,0.25,-1.15]
  ];
  const wheels = [];
  offsets.forEach(o=>{
    const w = new THREE.Mesh(wheelGeo, wheelMat);
    w.position.set(o[0],o[1],o[2]);
    w.castShadow = true;
    group.add(w);
    wheels.push(w);
  });

  return {group, wheels};
}
function createCarState(mesh, wheels, opts){
  return {
    mesh,
    wheels,
    pos: new V3(),
    heading: 0,
    speed: 0,
    steer: 0,
    throttle: 0,
    maxSpeed: opts.maxSpeed || 1.0,
    accel: opts.accel || 1.2,
    brake: opts.brake || 2.4,
    drag: opts.drag || 1.6,
    baseGrip: opts.baseGrip || 6.0,
    turnSpeed: opts.turnSpeed || 3.0,
    ai: !!opts.ai,
    tOnSpline: opts.tOnSpline || 0,
    lap: 0,
    lastCheckpoint: 0,
    skidTimer: 0,
    name: opts.name || 'CPU',
    aggression: opts.aggression || 0.5
  };
}

function addSkid(pos){
  const geo = new THREE.PlaneGeometry(0.12,0.6);
  const mat = new THREE.MeshBasicMaterial({color:0x111827, transparent:true, opacity:0.7, side:THREE.DoubleSide});
  const m = new THREE.Mesh(geo, mat);
  m.rotation.x = -Math.PI/2;
  m.position.copy(pos);
  m.position.y = 0.01;
  skidGroup.add(m);
  if(skidGroup.children.length>500){
    skidGroup.remove(skidGroup.children[0]);
  }
}
function addSmoke(pos){
  const geo = new THREE.SphereGeometry(0.12,8,8);
  const mat = new THREE.MeshBasicMaterial({color:0xd4d4d8, transparent:true, opacity:0.7});
  const m = new THREE.Mesh(geo, mat);
  m.position.copy(pos);
  m.position.y += 0.2;
  m.userData.life = 0.5;
  smokeGroup.add(m);
}
function addSparks(pos, normal){
  for(let i=0;i<6;i++){
    const geo = new THREE.SphereGeometry(0.05,6,6);
    const mat = new THREE.MeshBasicMaterial({color:0xfacc15, transparent:true, opacity:0.9});
    const m = new THREE.Mesh(geo, mat);

    m.userData.vel = normal.clone().multiplyScalar(-0.5).add(new V3((Math.random()-0.5)*0.6,Math.random()*0.6,(Math.random()-0.5)*0.6));
    m.userData.life = 0.3+Math.random()*0.2;

/* Car placement */
function placeCarOnSpline(state, t, laneOffset=0){
  const center = spline.getPointAt(t);
  const tan = spline.getTangentAt(t).normalize();
  const forward = tan.clone().multiplyScalar(-1);
  const bin = new V3().crossVectors(new V3(0,1,0), tan).normalize();
  const pos = center.clone()
    .add(forward.multiplyScalar(4.0))
    .add(bin.multiplyScalar(laneOffset));
  state.pos.copy(pos);
  state.mesh.position.copy(pos);
  state.mesh.position.y = 0.5;
  state.heading = Math.atan2(-tan.x, tan.z);
  state.speed = 0;
  state.lap = 0;
  state.lastCheckpoint = 0;
  const q = new Q().setFromAxisAngle(new V3(0,1,0), state.heading);
  state.mesh.quaternion.copy(q);
}

/* Physics & AI – BALANCED STEERING, NO WEIRD SIDE PULL */
function updatePlayer(dt){
  const forwardKey = keys['w'] || keys['arrowup'] || touchForward;
  const backKey    = keys['s'] || keys['arrowdown'];
  const leftKey    = keys['a'] || keys['arrowleft'] || touchLeft;
  const rightKey   = keys['d'] || keys['arrowright'] || touchRight;

  player.throttle = forwardKey ? 1 : backKey ? -1 : 0;

  let steerInput = 0;
  if(tiltEnabled){
    steerInput = tiltSteer;
  }else{
    if (leftKey && !rightKey) steerInput = -1;
    else if (rightKey && !leftKey) steerInput = 1;
  }
  player.steer = steerInput;

  if (player.throttle !== 0) {
    player.speed += player.throttle * player.accel * dt;
  } else {
    player.speed *= 0.97;
  }

  player.speed = Math.max(-player.maxSpeed * 0.4, Math.min(player.maxSpeed, player.speed));

  const speedNorm = Math.min(1, Math.abs(player.speed) / player.maxSpeed);
  const steerStrength = player.steer * player.turnSpeed * (0.5 + 0.5 * speedNorm);

  player.heading += steerStrength * dt;

  const forward = new V3(Math.sin(player.heading),0,-Math.cos(player.heading));
  player.pos.add(forward.multiplyScalar(player.speed * dt * 60));

  const nearest = nearestCenterPoint(player.pos);
  const center = nearest.point;
  const tan = spline.getTangentAt(nearest.t).normalize();
  const bin = new V3().crossVectors(new V3(0,1,0), tan).normalize();
  const lateral = player.pos.clone().sub(center).dot(bin);
  const halfRoad = 7*0.5 - 0.6;

  if(Math.abs(lateral) > halfRoad){
    const push = (Math.abs(lateral) - halfRoad);
    const dir = lateral > 0 ? -1 : 1;
    player.pos.add(bin.clone().multiplyScalar(dir*push));
    player.speed *= 0.4;
    const hitPos = player.pos.clone();
    hitPos.y = 0.4;
    addSparks(hitPos, bin.clone().multiplyScalar(dir));
  }

  player.mesh.position.copy(player.pos);
  player.mesh.position.y = 0.5 + Math.sin(performance.now()*0.005)*0.03;
  const targetQ = new Q().setFromAxisAngle(new V3(0,1,0), player.heading);
  player.mesh.quaternion.slerp(targetQ, Math.min(1, 10*dt));

  const wheelRot = player.speed * dt * 40;
  player.wheels.forEach(w=>{ w.rotation.x -= wheelRot; });

  const slip = Math.abs(lateral) * speedNorm;
  if(slip > 0.45 && Math.abs(player.speed) > 0.3){
    player.skidTimer += dt;
    if(player.skidTimer > 0.03){
      const rearLeft = player.wheels[2].getWorldPosition(new V3());
      const rearRight = player.wheels[3].getWorldPosition(new V3());
      addSkid(rearLeft);
      addSkid(rearRight);
      addSmoke(rearLeft);
      addSmoke(rearRight);
      player.skidTimer = 0;
    }
  }else{
    player.skidTimer = 0;
  }

  handleCheckpoints(player, nearest.t);

  currentLapTime += dt;
  hudTime.textContent = `Lap: ${currentLapTime.toFixed(3)}`;

  if(recording){
    replayBuffer.push({
      pos: player.pos.clone(),
      heading: player.heading,
      t: nearest.t
    });
    if(replayBuffer.length>6000) replayBuffer.shift();
  }

  if(player.lap>0){
    ghostPath.push(player.pos.clone());
    if(ghostPath.length>2000) ghostPath.shift();
  }
}
function updateAI(dt){
  const len = spline.getLength();
  for(const c of cpuCars){
    const lookAhead = 0.02;
    const futureT = (c.tOnSpline + lookAhead) % 1;
    const curTan = spline.getTangentAt(c.tOnSpline).normalize();
    const futTan = spline.getTangentAt(futureT).normalize();
    const angleDiff = Math.acos(Math.max(-1, Math.min(1, curTan.dot(futTan))));
    const curvatureFactor = 1 - Math.min(1, angleDiff*6);
    const targetSpeed = c.maxSpeed * (0.6 + 0.4*curvatureFactor);
    if(c.speed < targetSpeed) c.speed += c.accel * dt * 0.8;
    else c.speed -= c.accel * dt * 0.6;
    c.speed = Math.max(0.1, Math.min(c.maxSpeed, c.speed));
    const advance = (c.speed * dt * 60)/len;
    c.tOnSpline = (c.tOnSpline + advance) % 1;
    const center = spline.getPointAt(c.tOnSpline);
    const tan = spline.getTangentAt(c.tOnSpline).normalize();
    const forward = tan.clone().multiplyScalar(-1);
    let laneOffset = 0;
    for(const other of cpuCars){
      if(other===c) continue;
      const d = other.pos.distanceToSquared(c.pos);
      if(d<9){
        const side = Math.sign(Math.random()-0.5) || 1;
        laneOffset += side*0.4*c.aggression;
      }
    }
    c.pos.copy(center.clone().add(forward.multiplyScalar(4.0)).add(new V3(laneOffset,0,0)));
    c.mesh.position.copy(c.pos);
    c.mesh.position.y = 0.5;
    c.mesh.lookAt(center.x, center.y, center.z);
    const wheelRot = c.speed * dt * 40;
    c.wheels.forEach(w=>{ w.rotation.x -= wheelRot; });
    handleCheckpoints(c, c.tOnSpline);
  }
}
function handleCheckpoints(car, t){
  let nearestIdx = car.lastCheckpoint;
  let bestDist = Infinity;
  for(let i=0;i<checkpoints.length;i++){
    const d = car.mesh.position.distanceToSquared(checkpoints[i].p);
    if(d < bestDist){ bestDist = d; nearestIdx = i; }
  }
  if(nearestIdx !== car.lastCheckpoint){
    const expected = (car.lastCheckpoint + 1) % checkpoints.length;
    if(nearestIdx === expected){
      car.lastCheckpoint = nearestIdx;
      if(nearestIdx === 0){
        car.lap++;
        if(car === player){
          lastLapTimes.push(currentLapTime);
          if(!bestLapTime || currentLapTime<bestLapTime){
            bestLapTime = currentLapTime;
            hudBest.textContent = `Best: ${bestLapTime.toFixed(3)}`;
            buildGhostLine();
          }
          currentLapTime = 0;
        }
        if(car === player && car.lap >= lapTarget){
          running = false;
          recording = false;
          banner.textContent = 'FINISHED!';
          banner.style.display = 'block';
          setTimeout(()=>banner.style.display='none',2000);
        }
      }
    }
  }
}

/* Smoke & sparks update */
function updateParticles(dt){
  for(let i=smokeGroup.children.length-1;i>=0;i--){
    const s = smokeGroup.children[i];
    s.userData.life -= dt;
    s.position.y += dt*0.6;
    s.material.opacity = Math.max(0, s.userData.life*1.4);
    if(s.userData.life<=0){
      smokeGroup.remove(s);
    }
  }
  for(let i=sparksGroup.children.length-1;i>=0;i--){
    const s = sparksGroup.children[i];
    s.userData.life -= dt;
    s.position.add(s.userData.vel.clone().multiplyScalar(dt*60));
    s.material.opacity = Math.max(0, s.userData.life*3);
    if(s.userData.life<=0){
      sparksGroup.remove(s);
    }
  }
}

/* Mini-map */
function drawMiniMap(){
  miniCtx.clearRect(0,0,miniMapCanvas.width,miniMapCanvas.height);
  miniCtx.save();
  miniCtx.translate(100,100);
  miniCtx.scale(2.2,2.2);
  miniCtx.strokeStyle = '#4b5563';
  miniCtx.lineWidth = 1.5;
  miniCtx.beginPath();
  const segs = 160;
  for(let i=0;i<=segs;i++){
    const p = spline.getPointAt(i/segs);
    const x = p.x*0.1;
    const y = p.z*0.1;
    if(i===0) miniCtx.moveTo(x,y);
    else miniCtx.lineTo(x,y);
  }
  miniCtx.stroke();

  for(const c of cpuCars){
    const p = c.pos;
    miniCtx.fillStyle = '#3b82f6';
    miniCtx.beginPath();
    miniCtx.arc(p.x*0.1, p.z*0.1, 2, 0, Math.PI*2);
    miniCtx.fill();
  }
  const p = player.pos;
  miniCtx.fillStyle = '#22c55e';
  miniCtx.beginPath();
  miniCtx.arc(p.x*0.1, p.z*0.1, 3, 0, Math.PI*2);
  miniCtx.fill();
  miniCtx.restore();
}

/* Speedometer needle */
function updateSpeedo(){
  const speedKmh = Math.max(0, player.speed*60*3.6);
  const clamped = Math.min(220, speedKmh);
  const angle = -120 + (clamped/220)*240;
  speedNeedle.setAttribute('transform', `rotate(${angle} 50 50)`);
}

/* Camera shake + sun movement */
let shakeTimer = 0;
function applyCameraEffects(dt){
  const basePos = player.mesh.position.clone();
  const camOffset = new V3(0,4.2,10).applyQuaternion(player.mesh.quaternion);
  const desiredCam = basePos.clone().add(camOffset);
  if(Math.abs(player.speed)>0.7){
    shakeTimer += dt*6;
    const shakeMag = 0.05*Math.min(1, Math.abs(player.speed)/player.maxSpeed);
    desiredCam.x += (Math.sin(shakeTimer*13))*shakeMag;
    desiredCam.y += (Math.cos(shakeTimer*17))*shakeMag;
  }
  camera.position.lerp(desiredCam, Math.min(1, 6*dt));
  camera.lookAt(basePos.clone().add(new V3(0,0.6,0)));

  const t = performance.now()*0.00003;
  sun.position.set(Math.cos(t)*60, 50+Math.sin(t)*10, Math.sin(t)*60);
}

/* Replay update */
function updateReplay(dt){
  if(!replayMode || !replayBuffer.length) return;
  replayIndex += 60*dt;
  if(replayIndex>=replayBuffer.length) replayIndex = replayBuffer.length-1;
  const frame = replayBuffer[Math.floor(replayIndex)];
  if(!frame) return;
  player.pos.copy(frame.pos);
  player.heading = frame.heading;
  player.mesh.position.copy(player.pos);
  const q = new Q().setFromAxisAngle(new V3(0,1,0), player.heading);
  player.mesh.quaternion.copy(q);
}

/* Main loop */
let lastTime = performance.now();
function loop(){
  const now = performance.now();
  const dt = Math.min(0.05, (now-lastTime)/1000);
  lastTime = now;

  renderer.clear();

  if(replayMode){
    updateReplay(dt);
  }else{
    if(running && !paused && raceStarted){
      updatePlayer(dt);
      updateAI(dt);
    }
  }
  updateParticles(dt);
  applyCameraEffects(dt);
  drawMiniMap();
  updateSpeedo();

  hudLap.textContent = `Lap: ${player.lap} / ${lapTarget}`;
  const standings = allCars.map(c=>{
    const t = c.ai ? c.tOnSpline : nearestCenterPoint(c.mesh.position).t;
    return {c, progress: c.lap + t};
  }).sort((a,b)=>b.progress - a.progress);
  const pos = standings.findIndex(s=>s.c===player)+1;
  hudPos.textContent = `Pos: ${pos} / ${allCars.length}`;
  hudSpeed.textContent = `Speed: ${(player.speed*60).toFixed(1)}`;

  renderer.render(scene,camera);

  requestAnimationFrame(loop);
}

/* Init */
applyTrack('classic');
trackThumbs.forEach(t=>t.classList.toggle('active', t.dataset.track==='classic'));
lapTarget = parseInt(lapCountSelect.value,10);
hudLap.textContent = `Lap: ${player.lap} / ${lapTarget}`;
hudBest.textContent = 'Best: --';
updateGarageStats();
requestAnimationFrame(loop);

/* Resize */
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
