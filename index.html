<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Racer – Fixed Steering + Drift + UI</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
<style>
  :root{
    --ui-bg: rgba(6,10,20,0.78);
    --muted: #cbd5e1;
    --accent: #38bdf8;
  }
  html,body{
    margin:0;
    height:100%;
    background:#020617;
    color:#e5e7eb;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    overflow:hidden;
  }
  #canvas-wrap{position:fixed;inset:0;overflow:hidden}
  canvas{display:block;width:100%;height:100%}

  .topbar{
    position:fixed;
    left:12px;
    right:12px;
    top:8px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    z-index:30;
  }
  .panel{
    background:var(--ui-bg);
    backdrop-filter:blur(10px);
    padding:8px 10px;
    border-radius:10px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
    border:1px solid rgba(148,163,184,0.4);
  }
  label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
  select,button,input[type="color"]{
    background:rgba(15,23,42,0.95);
    border:1px solid rgba(148,163,184,0.6);
    color:#e5e7eb;
    padding:4px 8px;
    border-radius:6px;
    font-size:12px;
  }
  button{cursor:pointer}
  button.primary{
    border-color:var(--accent);
    color:var(--accent);
  }

  #hud{
    position:fixed;
    right:12px;
    top:12px;
    background:var(--ui-bg);
    backdrop-filter:blur(10px);
    padding:8px 10px;
    border-radius:10px;
    font-size:12px;
    z-index:30;
    border:1px solid rgba(148,163,184,0.4);
    min-width:130px;
  }
  #hud div{margin-bottom:2px}
  #hud div:last-child{margin-bottom:0}

  #controls{
    position:fixed;
    left:0;
    right:0;
    bottom:12px;
    display:flex;
    justify-content:center;
    gap:12px;
    pointer-events:none;
    z-index:30;
  }
  .btn{
    width:72px;
    height:72px;
    border-radius:16px;
    background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(15,23,42,0.95));
    color:#f9fafb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    pointer-events:auto;
    user-select:none;
    box-shadow:0 8px 20px rgba(0,0,0,0.45);
    border:1px solid rgba(148,163,184,0.5);
  }
  #btn-left{transform:translateX(-10px)}
  #btn-right{transform:translateX(10px)}
  #btn-forward{width:120px;border-radius:20px}
  #btn-boost{width:80px;border-radius:18px;font-size:14px}

  #lights{
    position:fixed;
    top:70px; /* moved down */
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    z-index:40;
  }
  .light{
    width:32px;
    height:32px;
    border-radius:50%;
    background:#1f2933;
    box-shadow:0 0 10px rgba(0,0,0,0.7);
    border:2px solid #111827;
  }
  .light.on{
    background:#ef4444;
    box-shadow:0 0 18px #f97373;
  }

  .banner{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:12px 18px;
    border-radius:999px;
    background:rgba(15,23,42,0.95);
    backdrop-filter:blur(10px);
    color:#f9fafb;
    font-size:20px;
    z-index:50;
    display:none;
    border:1px solid rgba(148,163,184,0.7);
  }

  #minimap{
    position:fixed;
    left:12px;
    bottom:12px;
    width:140px;
    height:140px;
    border-radius:999px;
    background:radial-gradient(circle at 30% 30%,rgba(148,163,184,0.25),rgba(15,23,42,0.95));
    border:1px solid rgba(148,163,184,0.6);
    overflow:hidden;
    z-index:30;
  }
  #minimap canvas{
    width:100%;
    height:100%;
    display:block;
  }

  #speedo{
    position:fixed;
    right:12px;
    bottom:12px;
    width:140px;
    height:140px;
    border-radius:999px;
    background:radial-gradient(circle at 30% 30%,rgba(15,23,42,0.9),rgba(15,23,42,0.98));
    border:1px solid rgba(148,163,184,0.6);
    z-index:30;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    color:#9ca3af;
  }
  #speedo svg{width:100%;height:100%}

  #garage{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:280px;
    background:rgba(15,23,42,0.96);
    border-radius:14px;
    border:1px solid rgba(148,163,184,0.7);
    padding:10px 12px;
    z-index:60;
    display:none;
  }
  #garage h3{
    margin:0 0 6px;
    font-size:14px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:#e5e7eb;
  }
  #garage p{
    margin:2px 0;
    font-size:12px;
    color:#cbd5e1;
  }
  #garage .row{
    display:flex;
    justify-content:space-between;
    font-size:11px;
    margin-top:4px;
  }
  #garage button{
    margin-top:8px;
    width:100%;
  }

  #trackThumbs{
    display:flex;
    gap:4px;
  }
  .thumb{
    width:40px;
    height:24px;
    border-radius:6px;
    border:1px solid rgba(148,163,184,0.6);
    background:#020617;
    position:relative;
    overflow:hidden;
  }
  .thumb span{
    position:absolute;
    inset:3px;
    border-radius:999px;
    border:2px solid rgba(148,163,184,0.7);
  }
  .thumb.active{
    border-color:var(--accent);
    box-shadow:0 0 8px rgba(56,189,248,0.6);
  }

  #timerBox{
    position:fixed;
    top:50%;
    right:12px;
    transform:translateY(-50%);
    background:var(--ui-bg);
    border-radius:10px;
    border:1px solid rgba(148,163,184,0.5);
    padding:6px 8px;
    font-size:11px;
    z-index:30;
  }
  #timerBox div{margin-bottom:2px}
  #timerBox div:last-child{margin-bottom:0}

  #replayHint{
    position:fixed;
    left:50%;
    bottom:52px;
    transform:translateX(-50%);
    font-size:11px;
    color:#9ca3af;
    background:rgba(15,23,42,0.9);
    padding:4px 8px;
    border-radius:999px;
    border:1px solid rgba(148,163,184,0.4);
    z-index:30;
  }

  #boostBar{
    position:fixed;
    left:50%;
    bottom:140px; /* moved up */
    transform:translateX(-50%);
    width:160px;
    height:10px;
    border-radius:999px;
    background:rgba(15,23,42,0.9);
    border:1px solid rgba(148,163,184,0.5);
    overflow:hidden;
    z-index:30;
  }
  #boostFill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#22c55e,#eab308,#ef4444);
  }

  @media (max-width:640px){
    .topbar{flex-direction:column;align-items:flex-start}
    #timerBox{display:none}
  }
</style>
</head>
<body>
<div id="canvas-wrap"></div>

<div id="lights">
  <div class="light" id="l1"></div>
  <div class="light" id="l2"></div>
  <div class="light" id="l3"></div>
  <div class="light" id="l4"></div>
  <div class="light" id="l5"></div>
</div>

<div class="banner" id="bannerText">GO!</div>

<div class="topbar">
  <div class="panel">
    <label>Track</label>
    <select id="trackSelect">
      <option value="classic">Classic Loop</option>
      <option value="figure8">Figure Eight</option>
      <option value="stadium">Stadium</option>
    </select>

    <div id="trackThumbs">
      <div class="thumb" data-track="classic"><span></span></div>
      <div class="thumb" data-track="figure8"><span></span></div>
      <div class="thumb" data-track="stadium"><span></span></div>
    </div>

    <label>Car</label>
    <select id="carSelect">
      <option value="red">Red</option>
      <option value="blue">Blue</option>
      <option value="green">Green</option>
      <option value="yellow">Yellow</option>
    </select>
    <label>Color</label>
    <input id="colorPicker" type="color" value="#ff4d4d">
    <button id="garageBtn">Garage</button>
  </div>

  <div class="panel">
    <label>AI</label>
    <select id="aiCount">
      <option value="1">1</option>
      <option value="2" selected>2</option>
      <option value="3">3</option>
      <option value="4">4</option>
    </select>
    <label>Laps</label>
    <select id="lapCount">
      <option value="1">1</option>
      <option value="3" selected>3</option>
      <option value="5">5</option>
    </select>
    <label>Tilt</label>
    <select id="tiltMode">
      <option value="off" selected>Off</option>
      <option value="on">On</option>
    </select>
    <button id="startBtn" class="primary">Start</button>
    <button id="pauseBtn">Pause</button>
    <button id="resetBtn">Reset</button>
  </div>
</div>

<div id="hud">
  <div id="hudLap">Lap: 0 / 3</div>
  <div id="hudPos">Pos: 1 / 1</div>
  <div id="hudSpeed">Speed: 0</div>
</div>

<div id="timerBox">
  <div id="curLapTime">Lap: 0.000</div>
  <div id="bestLapTime">Best: --</div>
</div>

<div id="controls">
  <div id="btn-left" class="btn">◀</div>
  <div id="btn-forward" class="btn">▲</div>
  <div id="btn-right" class="btn">▶</div>
  <div id="btn-boost" class="btn">BOOST</div>
</div>

<div id="minimap"><canvas id="minimapCanvas"></canvas></div>

<div id="speedo">
  <svg viewBox="0 0 100 100">
    <defs>
      <linearGradient id="speedGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#22c55e"/>
        <stop offset="50%" stop-color="#eab308"/>
        <stop offset="100%" stop-color="#ef4444"/>
      </linearGradient>
    </defs>
    <circle cx="50" cy="50" r="46" fill="none" stroke="#111827" stroke-width="4"/>
    <path d="M14 60 A36 36 0 0 1 86 60" fill="none" stroke="url(#speedGrad)" stroke-width="4" stroke-linecap="round"/>
    <line id="needle" x1="50" y1="50" x2="50" y2="16" stroke="#e5e7eb" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="50" cy="50" r="3" fill="#e5e7eb"/>
    <text x="50" y="72" text-anchor="middle" fill="#9ca3af" font-size="8">km/h</text>
    <text id="speedText" x="50" y="84" text-anchor="middle" fill="#e5e7eb" font-size="10">0</text>
  </svg>
</div>

<div id="garage">
  <h3>Garage</h3>
  <p id="garageCarName">Car: Red</p>
  <div class="row"><span>Top Speed</span><span id="garageTopSpeed">High</span></div>
  <div class="row"><span>Acceleration</span><span id="garageAccel">Quick</span></div>
  <div class="row"><span>Grip</span><span id="garageGrip">Balanced</span></div>
  <div class="row"><span>Handling</span><span id="garageHandling">Neutral</span></div>
  <button id="garageClose">Close</button>
</div>

<div id="replayHint">Shift / BOOST button = NOS</div>

<div id="boostBar"><div id="boostFill"></div></div>

<script>
const V3 = THREE.Vector3;
const Q = THREE.Quaternion;

/* Renderer / scene / camera */
const container = document.getElementById('canvas-wrap');
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7fb7ff);
scene.fog = new THREE.FogExp2(0x7fb7ff, 0.0007);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,6,14);

/* Lights */
const hemi = new THREE.HemisphereLight(0xffffff, 0x334155, 0.9);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(40,60,20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left = -80;
sun.shadow.camera.right = 80;
sun.shadow.camera.top = 80;
sun.shadow.camera.bottom = -80;
scene.add(sun);

/* Ground & scenery */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(1000,1000),
  new THREE.MeshStandardMaterial({color:0x14532d, roughness:0.95})
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.02;
ground.receiveShadow = true;
scene.add(ground);

const hills = new THREE.Group();
for(let i=0;i<18;i++){
  const g = new THREE.Mesh(
    new THREE.ConeGeometry(10+Math.random()*20, 30+Math.random()*40, 8),
    new THREE.MeshStandardMaterial({color:0x166534})
  );
  g.position.set((Math.random()-0.5)*700, -4, -200 - Math.random()*500);
  g.rotation.y = Math.random()*Math.PI;
  hills.add(g);
}
scene.add(hills);

/* Track builders */
function makeSpline(points, closed=true){
  return new THREE.CatmullRomCurve3(points, closed, 'catmullrom', 0.5);
}
function buildClassic(){
  const pts = [
    new V3(0,0,0),
    new V3(20,0,-10),
    new V3(35,0,8),
    new V3(18,0,22),
    new V3(-10,0,18),
    new V3(-30,0,4),
    new V3(-18,0,-16),
    new V3(0,0,-22),
    new V3(20,0,-10)
  ];
  return makeSpline(pts,true);
}
function buildFigure8(){
  const pts = [];
  const r = 22;
  for(let i=0;i<20;i++){
    const a = i/20*Math.PI*2;
    const x = Math.cos(a)*r + Math.sin(a)*r*0.4;
    const z = Math.sin(a)*r;
    pts.push(new V3(x,0,z));
  }
  return makeSpline(pts,true);
}
function buildStadium(){
  const pts = [];
  const w = 30, h = 14;
  for(let i=0;i<32;i++){
    const a = i/32*Math.PI*2;
    const x = Math.cos(a)*w + Math.sin(a)*h*0.2;
    const z = Math.sin(a)*h + Math.cos(a)*w*0.1;
    pts.push(new V3(x,0,z));
  }
  return makeSpline(pts,true);
}

/* Road / walls / centerline */
let spline = buildClassic();
let roadMesh = null;
let wallsGroup = null;
let centerLine = null;
let centerSamples = [];
let checkpoints = [];
let startFinishMesh = null;
let startFinishT = 0;

function buildRoad(spline, width=7, segments=800){
  if(roadMesh) scene.remove(roadMesh);
  const positions = new Float32Array((segments+1)*2*3);
  const uvs = new Float32Array((segments+1)*2*2);
  const indices = new Uint32Array(segments*6);
  let pi=0, ui=0, ii=0;
  for(let i=0;i<=segments;i++){
    const t = i/segments;
    const p = spline.getPointAt(t);
    const tan = spline.getTangentAt(t).normalize();
    const bin = new V3().crossVectors(new V3(0,1,0), tan).normalize();
    const left = p.clone().add(bin.clone().multiplyScalar(-width*0.5));
    const right = p.clone().add(bin.clone().multiplyScalar(width*0.5));
    positions[pi++] = left.x; positions[pi++] = left.y+0.01; positions[pi++] = left.z;
    positions[pi++] = right.x; positions[pi++] = right.y+0.01; positions[pi++] = right.z;
    uvs[ui++] = t; uvs[ui++] = 0;
    uvs[ui++] = t; uvs[ui++] = 1;
    if(i<segments){
      const a = i*2, b = i*2+1, c = (i+1)*2, d = (i+1)*2+1;
      indices[ii++] = a; indices[ii++] = b; indices[ii++] = c;
      indices[ii++] = b; indices[ii++] = d; indices[ii++] = c;
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  geo.setAttribute('uv', new THREE.BufferAttribute(uvs,2));
  geo.setIndex(new THREE.BufferAttribute(indices,1));
  geo.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({
    color:0x111827,
    roughness:0.9,
    metalness:0.05
  });
  roadMesh = new THREE.Mesh(geo, mat);
  roadMesh.receiveShadow = true;
  scene.add(roadMesh);
}
function buildWalls(spline, width=7, samples=260){
  if(wallsGroup) scene.remove(wallsGroup);
  wallsGroup = new THREE.Group();
  const wallHeight = 1.2, wallThickness = 0.6;
  const len = spline.getLength();
  const segLen = len/samples;
  const mat = new THREE.MeshStandardMaterial({color:0x020617, roughness:0.4, metalness:0.2});
  for(let i=0;i<samples;i++){
    const t = i/samples;
    const p = spline.getPointAt(t);
    const tan = spline.getTangentAt(t).normalize();
    const bin = new V3().crossVectors(new V3(0,1,0), tan).normalize();
    const leftPos = p.clone().add(bin.clone().multiplyScalar(-width*0.5 - wallThickness*0.5));
    const rightPos = p.clone().add(bin.clone().multiplyScalar(width*0.5 + wallThickness*0.5));
    const wallGeo = new THREE.BoxGeometry(wallThickness, wallHeight, segLen*1.05);
    const leftWall = new THREE.Mesh(wallGeo, mat);
    leftWall.position.copy(leftPos); leftWall.position.y = wallHeight*0.5;
    leftWall.lookAt(p.clone().add(tan));
    leftWall.castShadow = true;
    wallsGroup.add(leftWall);
    const rightWall = leftWall.clone();
    rightWall.position.copy(rightPos); rightWall.position.y = wallHeight*0.5;
    wallsGroup.add(rightWall);
  }
  scene.add(wallsGroup);
}
function buildCenterLine(spline){
  if(centerLine) scene.remove(centerLine);
  const pts = [];
  const segs = 400;
  for(let i=0;i<=segs;i++){
    const p = spline.getPointAt(i/segs);
    pts.push(new V3(p.x, p.y+0.02, p.z));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineDashedMaterial({color:0xfacc15, dashSize:0.8, gapSize:0.8});
  centerLine = new THREE.Line(geo, mat);
  centerLine.computeLineDistances();
  scene.add(centerLine);
}
function buildCenterSamples(spline, count=1200){
  centerSamples = new Array(count);
  for(let i=0;i<count;i++){
    const t = i/count;
    centerSamples[i] = {t, p: spline.getPointAt(t)};
  }
}
function nearestCenterPoint(pos){
  let best = null, bestDist = Infinity, bestIdx = 0;
  const step = 4;
  for(let i=0;i<centerSamples.length;i+=step){
    const d = pos.distanceToSquared(centerSamples[i].p);
    if(d < bestDist){ bestDist = d; best = centerSamples[i]; bestIdx = i; }
  }
  const start = Math.max(0, bestIdx-24);
  const end = Math.min(centerSamples.length-1, bestIdx+24);
  for(let i=start;i<=end;i++){
    const d = pos.distanceToSquared(centerSamples[i].p);
    if(d < bestDist){ bestDist = d; best = centerSamples[i]; }
  }
  return {point: best.p.clone(), t: best.t};
}
function buildStartFinish(spline, t=0){
  if(startFinishMesh) scene.remove(startFinishMesh);
  startFinishT = t;
  const p = spline.getPointAt(t);
  const geo = new THREE.PlaneGeometry(2,7);
  const mat = new THREE.MeshBasicMaterial({color:0xffffff, side:THREE.DoubleSide});
  startFinishMesh = new THREE.Mesh(geo, mat);
  startFinishMesh.rotation.x = -Math.PI/2;
  startFinishMesh.position.copy(p);
  scene.add(startFinishMesh);
}
function buildCheckpoints(spline, count=12){
  checkpoints = [];
  for(let i=0;i<count;i++){
    const t = i/count;
    const p = spline.getPointAt(t);
    checkpoints.push({t, p});
  }
}

/* Car factory */
function makeCarMesh(color){
  const group = new THREE.Group();

  const chassisMat = new THREE.MeshStandardMaterial({color, metalness:0.45, roughness:0.3});
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(1.7,0.5,3.2),
    chassisMat
  );
  body.position.y = 0.45;
  body.castShadow = true;
  group.add(body);

  const hood = new THREE.Mesh(
    new THREE.BoxGeometry(1.5,0.3,1.1),
    new THREE.MeshStandardMaterial({color:0x0f172a, metalness:0.3, roughness:0.2})
  );
  hood.position.set(0,0.75,0.7);
  hood.castShadow = true;
  group.add(hood);

  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(1.2,0.55,1.3),
    new THREE.MeshStandardMaterial({color:0x020617, metalness:0.2, roughness:0.2})
  );
  cabin.position.set(0,0.9,-0.4);
  cabin.castShadow = true;
  group.add(cabin);

  const spoiler = new THREE.Mesh(
    new THREE.BoxGeometry(1.4,0.08,0.4),
    new THREE.MeshStandardMaterial({color:0x111827, metalness:0.4, roughness:0.3})
  );
  spoiler.position.set(0,0.9,-1.5);
  group.add(spoiler);

  const stripe = new THREE.Mesh(
    new THREE.BoxGeometry(0.25,0.02,3.2),
    new THREE.MeshStandardMaterial({color:0xf97316, metalness:0.2, roughness:0.4})
  );
  stripe.position.set(0,0.71,0);
  group.add(stripe);

  const headMat = new THREE.MeshBasicMaterial({color:0xf9fafb});
  const tailMat = new THREE.MeshBasicMaterial({color:0xef4444});
  const headL = new THREE.Mesh(new THREE.BoxGeometry(0.18,0.12,0.06), headMat);
  const headR = headL.clone();
  headL.position.set(0.45,0.45,1.7);
  headR.position.set(-0.45,0.45,1.7);
  group.add(headL, headR);

  const tailL = new THREE.Mesh(new THREE.BoxGeometry(0.22,0.14,0.06), tailMat);
  const tailR = tailL.clone();
  tailL.position.set(0.5,0.45,-1.7);
  tailR.position.set(-0.5,0.45,-1.7);
  group.add(tailL, tailR);

  const wheelGeo = new THREE.CylinderGeometry(0.35,0.35,0.4,16);
  wheelGeo.rotateZ(Math.PI/2);
  const wheelMat = new THREE.MeshStandardMaterial({color:0x020617, metalness:0.3, roughness:0.4});
  const offsets = [
    [0.9,0.25,1.1],[-0.9,0.25,1.1],
    [0.9,0.25,-1.1],[-0.9,0.25,-1.1]
  ];
  const wheels = [];
  offsets.forEach(o=>{
    const w = new THREE.Mesh(wheelGeo, wheelMat);
    w.position.set(o[0],o[1],o[2]);
    w.castShadow = true;
    group.add(w);
    wheels.push(w);
  });

  return {group, wheels};
}

function placeCarOnSpline(state, t, laneOffset=0){
  const center = spline.getPointAt(t);
  const tan = spline.getTangentAt(t).normalize();
  const forward = tan.clone().multiplyScalar(-1);
  const bin = new V3().crossVectors(new V3(0,1,0), tan).normalize();
  const pos = center.clone()
    .add(forward.multiplyScalar(4.0))
    .add(bin.multiplyScalar(laneOffset));
  state.pos.copy(pos);
  state.mesh.position.copy(pos);
  state.mesh.position.y = 0.5;
  state.heading = Math.atan2(-tan.x, tan.z);
  state.speed = 0;
  state.lap = 0;
  state.lastCheckpoint = 0;
  const q = new Q().setFromAxisAngle(new V3(0,1,0), state.heading);
  state.mesh.quaternion.copy(q);
}

/* Physics & AI – steering fixed, drift + boost */
function updatePlayer(dt){

  const forwardKey = keys['w'] || keys['arrowup'] || touchForward;
  const backKey    = keys['s'] || keys['arrowdown'];
  const leftKey    = keys['a'] || keys['arrowleft'] || touchLeft;
  const rightKey   = keys['d'] || keys['arrowright'] || touchRight;
  const boostKey   = keys['shift'] || touchBoost;

  player.throttle = forwardKey ? 1 : backKey ? -1 : 0;

  let steerInput = 0;
  if(tiltMode){
    steerInput = tiltSteer;
  } else {
    if(leftKey && !rightKey) steerInput = -1;
    else if(rightKey && !leftKey) steerInput = 1;
  }
  player.steer = steerInput;

  if(boostKey && player.boost > 0){
    player.boost -= dt * 0.25;
    if(player.boost < 0) player.boost = 0;
  } else {
    player.boost += dt * 0.12;
    if(player.boost > 1) player.boost = 1;
  }
  boostFill.style.width = (player.boost*100)+'%';

  const boostFactor = 1 + 0.6 * (boostKey && player.boost>0 ? 1 : 0);

  if(player.throttle !== 0){
    player.speed += player.throttle * player.accel * dt * boostFactor;
  } else {
    player.speed -= player.drag * dt * Math.sign(player.speed);
  }

  const maxFwd = player.maxSpeed * 0.75 * boostFactor;
  const maxRev = -player.maxSpeed * 0.3;

  player.speed = Math.min(maxFwd, Math.max(maxRev, player.speed));
  if(Math.abs(player.speed) < 0.001) player.speed = 0;

  const speedNorm = maxFwd > 0 ? Math.min(1, Math.abs(player.speed) / maxFwd) : 0;
  const turnRate = player.turnSpeed * (0.45 + 0.55 * speedNorm);

  player.heading -= player.steer * turnRate * dt;

  const q = new Q().setFromAxisAngle(new V3(0,1,0), player.heading);
  player.mesh.quaternion.slerp(q, Math.min(1, 18*dt));

  const forward = new V3(0,0,-1).applyQuaternion(player.mesh.quaternion);

  const drift = 0.45 * speedNorm * Math.abs(player.steer);
  const lateral = new V3(-forward.z,0,forward.x).multiplyScalar(drift);

  const moveDir = forward.clone().add(lateral).normalize();

  player.pos.add(moveDir.multiplyScalar(player.speed * dt * 60));

  const nearest = nearestCenterPoint(player.pos);
  const center = nearest.point;
  const tan = spline.getTangentAt(nearest.t).normalize();
  const bin = new V3().crossVectors(new V3(0,1,0), tan).normalize();
  const lateralDist = player.pos.clone().sub(center).dot(bin);
  const halfRoad = 7*0.5 - 0.5;

  if(Math.abs(lateralDist) > halfRoad){
    const dir = lateralDist > 0 ? 1 : -1;
    player.pos.add(bin.clone().multiplyScalar((halfRoad - Math.abs(lateralDist)) * dir));
    player.speed *= 0.4;
    cameraShakeTimer = 0.25;
  }

  player.mesh.position.copy(player.pos);
  player.mesh.position.y = 0.5 + Math.sin(performance.now()*0.005)*0.03;

  const wheelRot = player.speed * dt * 40;
  player.wheels.forEach(w=>{ w.rotation.x -= wheelRot; });

  const slip = Math.abs(lateralDist) * speedNorm;
  if(slip > 0.4 && Math.abs(player.speed) > 0.3){
    player.skidTimer += dt;
    if(player.skidTimer > 0.03){
      const rearLeft = player.wheels[2].getWorldPosition(new V3());
      const rearRight = player.wheels[3].getWorldPosition(new V3());
      addSkid(rearLeft);
      addSkid(rearRight);
      addSmoke(rearLeft);
      addSmoke(rearRight);
      player.skidTimer = 0;
    }
  }else{
    player.skidTimer = 0;
  }

  handleCheckpoints(player, nearest.t);
}
function updateAI(dt){
  const len = spline.getLength();
  for(const c of cpuCars){
    const lookAhead = 0.02;
    const futureT = (c.tOnSpline + lookAhead) % 1;
    const curTan = spline.getTangentAt(c.tOnSpline).normalize();
    const futTan = spline.getTangentAt(futureT).normalize();
    const angleDiff = Math.acos(Math.max(-1, Math.min(1, curTan.dot(futTan))));
    const curvatureFactor = 1 - Math.min(1, angleDiff*6);
    let targetSpeed = c.maxSpeed * (0.6 + 0.4*curvatureFactor);

    for(const other of allCars){
      if(other===c) continue;
      const dist = c.pos.distanceTo(other.pos);
      if(dist < 3 && c.pos.distanceToSquared(other.pos) < 9){
        if(other.pos.z < c.pos.z + 1){
          targetSpeed *= 0.7;
        }
      }
    }

    if(c.speed < targetSpeed) c.speed += c.accel * dt * 0.8;
    else c.speed -= c.accel * dt * 0.6;
    c.speed = Math.max(0.1, Math.min(c.maxSpeed, c.speed));

    const advance = (c.speed * dt * 60)/len;
    c.tOnSpline = (c.tOnSpline + advance) % 1;
    const center = spline.getPointAt(c.tOnSpline);
    const tan = spline.getTangentAt(c.tOnSpline).normalize();
    const forward = tan.clone().multiplyScalar(-1);
    c.pos.copy(center.clone().add(forward.multiplyScalar(4.0)));
    c.mesh.position.copy(c.pos);
    c.mesh.position.y = 0.5;
    c.mesh.lookAt(center.x, center.y, center.z);
    const wheelRot = c.speed * dt * 40;
    c.wheels.forEach(w=>{ w.rotation.x -= wheelRot; });
    handleCheckpoints(c, c.tOnSpline);
  }
}
function handleCheckpoints(car, t){
  let nearestIdx = car.lastCheckpoint;
  let bestDist = Infinity;
  for(let i=0;i<checkpoints.length;i++){
    const d = car.mesh.position.distanceToSquared(checkpoints[i].p);
    if(d < bestDist){ bestDist = d; nearestIdx = i; }
  }
  if(nearestIdx !== car.lastCheckpoint){
    const expected = (car.lastCheckpoint + 1) % checkpoints.length;
    if(nearestIdx === expected){
      car.lastCheckpoint = nearestIdx;
      if(nearestIdx === 0){
        car.lap++;
        if(car === player){
          const now = performance.now();
          if(currentLapStartTime){
            const lapTime = (now - currentLapStartTime)/1000;
            if(bestLap === null || lapTime < bestLap){
              bestLap = lapTime;
              bestLapTimeEl.textContent = 'Best: ' + lapTime.toFixed(3);
            }
          }
          currentLapStartTime = now;
          if(car.lap >= lapTarget){
            running = false;
            banner.textContent = 'FINISHED!';
            banner.style.display = 'block';
            setTimeout(()=>banner.style.display='none',2000);
          }
        }
      }
    }
  }
}

/* Smoke update */
function updateSmoke(dt){
  for(let i=smokeGroup.children.length-1;i>=0;i--){
    const s = smokeGroup.children[i];
    s.userData.life -= dt;
    s.position.y += dt*0.6;
    s.material.opacity = Math.max(0, s.userData.life*1.4);
    if(s.userData.life<=0){
      smokeGroup.remove(s);
    }
  }
}

/* Minimap */
function drawMinimap(){
  minimapSize = minimapCanvas.width = minimapCanvas.height = 140;
  minimapCtx.clearRect(0,0,minimapSize,minimapSize);
  minimapCtx.save();
  minimapCtx.translate(minimapSize/2, minimapSize/2);
  minimapCtx.scale(1,-1);

  minimapCtx.strokeStyle = '#1f2937';
  minimapCtx.lineWidth = 18;
  minimapCtx.beginPath();
  const segs = 200;
  for(let i=0;i<=segs;i++){
    const t = i/segs;
    const p = spline.getPointAt(t);
    const scale = 1.4;
    const x = p.x/40*scale*minimapSize*0.4;
    const y = p.z/40*scale*minimapSize*0.4;
    if(i===0) minimapCtx.moveTo(x,y);
    else minimapCtx.lineTo(x,y);
  }
  minimapCtx.stroke();

  minimapCtx.strokeStyle = '#facc15';
  minimapCtx.lineWidth = 3;
  minimapCtx.setLineDash([4,4]);
  minimapCtx.beginPath();
  for(let i=0;i<=segs;i++){
    const t = i/segs;
    const p = spline.getPointAt(t);
    const scale = 1.4;
    const x = p.x/40*scale*minimapSize*0.4;
    const y = p.z/40*scale*minimapSize*0.4;
    if(i===0) minimapCtx.moveTo(x,y);
    else minimapCtx.lineTo(x,y);
  }
  minimapCtx.stroke();
  minimapCtx.restore();
}

  minimapCtx.beginPath();
  minimapCtx.arc(0,0,minimapSize/2,0,Math.PI*2);

  minimapCtx.strokeStyle = '#1f2937';

  minimapCtx.strokeStyle = '#facc15';
  minimapCtx.lineWidth = 3;
  minimapCtx.setLineDash([4,4]);
  minimapCtx.beginPath();
  for(let i=0;i<=segs;i++){
    const t = i/segs;
    const p = spline.getPointAt(t);
    const scale = 1.4;
    const x = p.x/40*scale*minimapSize*0.4;
    const y = p.z/40*scale*minimapSize*0.4;
    if(i===0) minimapCtx.moveTo(x,y);

  }

    minimapCtx.fill();
  }
  drawDot(player, '#38bdf8');
  cpuCars.forEach(c=>drawDot(c, '#f97316'));

/* Speedo */
function updateSpeedo(){
  const kmh = Math.max(0, player.speed*60*3.6);
  const clamped = Math.min(220, kmh);
  const angle = -120 + (clamped/220)*240;
  const rad = angle * Math.PI/180;
  const x2 = 50 + Math.cos(rad)*34;
  const y2 = 50 - Math.sin(rad)*34;
  needle.setAttribute('x2', x2.toString());
  needle.setAttribute('y2', y2.toString());
  speedTextSvg.textContent = Math.round(kmh).toString();
}

/* Lap timer */
function updateLapTimer(){
  if(!currentLapStartTime) return;
  const now = performance.now();
  const lapTime = (now - currentLapStartTime)/1000;
  curLapTimeEl.textContent = 'Lap: ' + lapTime.toFixed(3);
}

/* Camera follow + shake + zoom */
function applyCamera(dt){
  const speedNorm = Math.min(1, Math.abs(player.speed)/(player.maxSpeed*1.4));
  const baseOffset = new V3(0,4.2,10 + 4*speedNorm).applyQuaternion(player.mesh.quaternion);
  const desiredCam = player.mesh.position.clone().add(baseOffset);

  if(cameraLagPos.lengthSq() === 0){
    cameraLagPos.copy(desiredCam);
  }
  cameraLagPos.lerp(desiredCam, Math.min(1, 4*dt));

  if(cameraShakeTimer > 0){
    cameraShakeTimer -= dt;
    const intensity = cameraShakeTimer*4;
    cameraLagPos.x += (Math.random()-0.5)*intensity;
    cameraLagPos.y += (Math.random()-0.5)*intensity*0.5;
    cameraLagPos.z += (Math.random()-0.5)*intensity;
  }

  camera.position.copy(cameraLagPos);
  const lookTarget = player.mesh.position.clone().add(new V3(0,0.6,0));
  camera.lookAt(lookTarget);
}

/* Main loop */
let lastTime = performance.now();
function loop(){
  const now = performance.now();
  const dt = Math.min(0.05, (now-lastTime)/1000);
  lastTime = now;

  if(running && !paused && raceStarted){
    updatePlayer(dt);
    updateAI(dt);
  }
  updateSmoke(dt);
  applyCamera(dt);
  updateMinimapCars();
  updateSpeedo();
  updateLapTimer();

  hudLap.textContent = `Lap: ${player.lap} / ${lapTarget}`;
  const standings = allCars.map(c=>{
    const t = c.ai ? c.tOnSpline : nearestCenterPoint(c.mesh.position).t;
    return {c, progress: c.lap + t};
  }).sort((a,b)=>b.progress - a.progress);
  const pos = standings.findIndex(s=>s.c===player)+1;
  hudPos.textContent = `Pos: ${pos} / ${allCars.length}`;
  hudSpeed.textContent = `Speed: ${(player.speed*60).toFixed(1)}`;

  renderer.render(scene,camera);
  requestAnimationFrame(loop);
}

/* Init */
applyTrack('classic');
lapTarget = parseInt(lapCountSelect.value,10);
hudLap.textContent = `Lap: ${player.lap} / ${lapTarget}`;
drawMinimap();
requestAnimationFrame(loop);

/* Resize */
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* Debug */
window.__racer = {scene, camera, spline, player, cpuCars, allCars};
</script>
