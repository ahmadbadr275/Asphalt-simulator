<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stadium Racer</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;}
  body{background:#020617;color:#e5e7eb;overflow:hidden;}
  canvas{display:block;}

  #hud{
    position:fixed;top:10px;left:10px;z-index:10;
    background:rgba(15,23,42,0.8);padding:8px 12px;border-radius:8px;
    font-size:12px;line-height:1.4;min-width:150px;
  }
  #hud div{margin-bottom:2px;}

  #bars{
    position:fixed;bottom:10px;left:10px;z-index:10;
    display:flex;flex-direction:column;gap:4px;width:180px;
  }
  .barWrap{background:#020617;border-radius:999px;overflow:hidden;border:1px solid #1f2937;height:10px;}
  .barFill{height:100%;width:100%;transition:width 0.1s linear;}
  #boostFill{background:#22c55e;}
  #fuelFill{background:#f97316;}
  #damageFill{background:#ef4444;}

  #minimapWrap{
    position:fixed;bottom:10px;right:10px;z-index:10;
    background:rgba(15,23,42,0.9);padding:6px;border-radius:8px;
  }
  #minimapCanvas{width:140px;height:140px;display:block;background:#020617;border-radius:6px;}

  #lights{
    position:fixed;top:10px;right:10px;z-index:10;
    display:flex;gap:4px;
  }
  .light{
    width:16px;height:16px;border-radius:999px;
    background:#111827;border:2px solid #1f2937;
  }
  .light.on{background:#ef4444;}

  #bannerText{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:64px;font-weight:800;color:#facc15;
    text-shadow:0 0 20px #000;
    display:none;z-index:20;
  }

  #topButtons{
    position:fixed;top:10px;left:50%;transform:translateX(-50%);
    display:flex;gap:6px;z-index:10;
  }
  button{
    padding:6px 10px;border-radius:999px;border:none;
    background:#1f2937;color:#e5e7eb;font-size:12px;cursor:pointer;
  }
  button:hover{background:#374151;}

  #homeScreen,#garage{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at top,#0f172a,#020617);z-index:30;
  }
  #homeScreenInner,#garageInner{
    background:rgba(15,23,42,0.95);padding:20px 24px;border-radius:16px;
    box-shadow:0 20px 60px rgba(0,0,0,0.7);min-width:260px;
  }
  h1{font-size:22px;margin-bottom:8px;}
  h2{font-size:18px;margin-bottom:6px;}
  .modeBtns{display:flex;flex-direction:column;gap:6px;margin-top:10px;}
  .modeBtns button{width:100%;justify-content:center;}
  #garage{display:none;}
  #garageInner{display:flex;flex-direction:column;gap:10px;}
  select{background:#020617;color:#e5e7eb;border-radius:999px;border:1px solid #1f2937;padding:4px 8px;font-size:12px;}

  #touchControls{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    display:flex;gap:10px;z-index:9;
  }
  .touchBtn{
    width:50px;height:50px;border-radius:999px;
    background:rgba(15,23,42,0.7);border:1px solid #1f2937;
    display:flex;align-items:center;justify-content:center;
    color:#e5e7eb;font-size:18px;user-select:none;
  }
</style>
</head>
<body>
<div id="bannerText"></div>

<div id="hud">
  <div id="hudLap">Lap: 0 / 3</div>
  <div id="hudPos">Pos: 1 / 3</div>
  <div id="hudSpeed">Speed: 0</div>
  <div id="hudTimer">Time: 0.000</div>
  <div id="hudBest">Best: --</div>
</div>

<div id="bars">
  <div class="barWrap"><div id="boostFill" class="barFill"></div></div>
  <div class="barWrap"><div id="fuelFill" class="barFill"></div></div>
  <div class="barWrap"><div id="damageFill" class="barFill"></div></div>
</div>

<div id="minimapWrap">
  <canvas id="minimapCanvas" width="140" height="140"></canvas>
</div>

<div id="lights">
  <div id="l1" class="light"></div>
  <div id="l2" class="light"></div>
  <div id="l3" class="light"></div>
  <div id="l4" class="light"></div>
  <div id="l5" class="light"></div>
</div>

<div id="topButtons">
  <button id="startBtn">Start</button>
  <button id="resetBtn">Reset</button>
  <button id="pauseBtn">Pause</button>
  <select id="trackSelect">
    <option value="classic">Classic</option>
    <option value="oval">Oval</option>
    <option value="figure8">Figure 8</option>
  </select>
</div>

<div id="touchControls">
  <div id="btnLeft" class="touchBtn">⟵</div>
  <div id="btnForward" class="touchBtn">▲</div>
  <div id="btnRight" class="touchBtn">⟶</div>
  <div id="btnBoost" class="touchBtn">⚡</div>
</div>

<div id="homeScreen">
  <div id="homeScreenInner">
    <h1>Stadium Racer</h1>
    <p>Pick a mode to jump in:</p>
    <div class="modeBtns">
      <button id="modeRaceBtn">Race</button>
      <button id="modeTimeBtn">Time Attack</button>
      <button id="modeCopsBtn">Cops &amp; Racer</button>
    </div>
  </div>
</div>

<div id="garage">
  <div id="garageInner">
    <h2>Garage</h2>
    <label>Car:
      <select id="carSelect">
        <option value="ferrari">Ferrari</option>
        <option value="bugatti">Bugatti</option>
        <option value="porsche">Porsche</option>
        <option value="supra">Supra</option>
        <option value="police">Police</option>
      </select>
    </label>
    <div style="display:flex;gap:6px;margin-top:10px;">
      <button id="garageStartBtn">Enter Track</button>
      <button id="garageBackBtn">Back</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script>
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x020617);

const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,10,-18);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);

const hemi=new THREE.HemisphereLight(0xffffff,0x111827,0.7);
scene.add(hemi);
const dir=new THREE.DirectionalLight(0xffffff,0.9);
dir.position.set(20,40,10);
dir.castShadow=true;
scene.add(dir);

const ground=new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x020617,roughness:1,metalness:0})
);
ground.rotation.x=-Math.PI/2;
ground.receiveShadow=true;
scene.add(ground);

/* Track splines */

let spline;
function buildClassic(){
  const pts=[
    new THREE.Vector3(-20,0,-10),
    new THREE.Vector3(0,0,-20),
    new THREE.Vector3(20,0,-10),
    new THREE.Vector3(20,0,10),
    new THREE.Vector3(0,0,20),
    new THREE.Vector3(-20,0,10),
  ];
  return new THREE.CatmullRomCurve3(pts,true,'catmullrom',0.5);
}
function buildOval(){
  const pts=[
    new THREE.Vector3(-25,0,0),
    new THREE.Vector3(-10,0,-15),
    new THREE.Vector3(10,0,-15),
    new THREE.Vector3(25,0,0),
    new THREE.Vector3(10,0,15),
    new THREE.Vector3(-10,0,15),
  ];
  return new THREE.CatmullRomCurve3(pts,true,'catmullrom',0.5);
}
function buildFigure8(){
  const pts=[
    new THREE.Vector3(-15,0,-10),
    new THREE.Vector3(0,0,-15),
    new THREE.Vector3(15,0,-10),
    new THREE.Vector3(-15,0,10),
    new THREE.Vector3(0,0,15),
    new THREE.Vector3(15,0,10),
  ];
  return new THREE.CatmullRomCurve3(pts,true,'catmullrom',0.5);
}

let roadMesh=null;
let stadiumWalls=[];
let checkpoints=[];
function buildRoad(curve){
  if(roadMesh) scene.remove(roadMesh);
  const pts=curve.getPoints(400);
  const geo=new THREE.TubeGeometry(curve,400,2.5,16,true);
  const mat=new THREE.MeshStandardMaterial({color:0x111827,roughness:0.8,metalness:0.1});
  roadMesh=new THREE.Mesh(geo,mat);
  roadMesh.receiveShadow=true;
  scene.add(roadMesh);
}
function buildTrackWalls(curve){
  stadiumWalls.forEach(w=>scene.remove(w));
  stadiumWalls=[];
  const pts=curve.getPoints(80);
  pts.forEach(p=>{
    const wall=new THREE.Mesh(
      new THREE.BoxGeometry(0.5,2,8),
      new THREE.MeshStandardMaterial({color:0x1f2937,roughness:0.7})
    );
    wall.position.set(p.x,1,p.z);
    wall.rotation.y=Math.random()*Math.PI*2;
    wall.castShadow=true;
    scene.add(wall);
    stadiumWalls.push(wall);
  });
}
function buildCheckpoints(){
  checkpoints=[];
  const pts=spline.getPoints(20);
  pts.forEach(p=>{
    checkpoints.push({p});
  });
}

/* Car models */

function makeFerrariStyle(){
  const group=new THREE.Group();
  const bodyMat=new THREE.MeshStandardMaterial({color:0xff2d2d,metalness:0.6,roughness:0.3});
  const body=new THREE.Mesh(new THREE.BoxGeometry(1.9,0.5,3.6),bodyMat);
  body.position.y=0.45;group.add(body);
  const cabin=new THREE.Mesh(new THREE.BoxGeometry(1.3,0.6,1.5),
    new THREE.MeshStandardMaterial({color:0x020617,metalness:0.3,roughness:0.2}));
  cabin.position.set(0,0.9,-0.1);group.add(cabin);
  const spoiler=new THREE.Mesh(new THREE.BoxGeometry(1.7,0.08,0.5),
    new THREE.MeshStandardMaterial({color:0x111827,metalness:0.4,roughness:0.3}));
  spoiler.position.set(0,0.9,-1.7);group.add(spoiler);
  const wheelGeo=new THREE.CylinderGeometry(0.35,0.35,0.4,18);
  wheelGeo.rotateZ(Math.PI/2);
  const wheelMat=new THREE.MeshStandardMaterial({color:0x020617});
  const offsets=[[0.95,0.25,1.25],[-0.95,0.25,1.25],[0.95,0.25,-1.25],[-0.95,0.25,-1.25]];
  const wheels=[];
  offsets.forEach(o=>{
    const w=new THREE.Mesh(wheelGeo,wheelMat);
    w.position.set(o[0],o[1],o[2]);
    w.castShadow=true;
    group.add(w);
    wheels.push(w);
  });
  return {group,wheels};
}
function makeBugattiStyle(){
  const group=new THREE.Group();
  const bodyMat=new THREE.MeshStandardMaterial({color:0x2563eb,metalness:0.7,roughness:0.25});
  const body=new THREE.Mesh(new THREE.BoxGeometry(2.0,0.55,3.7),bodyMat);
  body.position.y=0.45;group.add(body);
  const cabin=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.7,1.6),
    new THREE.MeshStandardMaterial({color:0x020617,metalness:0.4,roughness:0.2}));
  cabin.position.set(0,0.95,-0.1);group.add(cabin);
  const wheelGeo=new THREE.CylinderGeometry(0.36,0.36,0.45,20);
  wheelGeo.rotateZ(Math.PI/2);
  const wheelMat=new THREE.MeshStandardMaterial({color:0x020617});
  const offsets=[[1.05,0.25,1.3],[-1.05,0.25,1.3],[1.05,0.25,-1.3],[-1.05,0.25,-1.3]];
  const wheels=[];
  offsets.forEach(o=>{
    const w=new THREE.Mesh(wheelGeo,wheelMat);
    w.position.set(o[0],o[1],o[2]);
    w.castShadow=true;
    group.add(w);
    wheels.push(w);
  });
  return {group,wheels};
}
function makePorscheStyle(){
  const group=new THREE.Group();
  const bodyMat=new THREE.MeshStandardMaterial({color:0xfacc15,metalness:0.6,roughness:0.3});
  const body=new THREE.Mesh(new THREE.BoxGeometry(1.8,0.55,3.4),bodyMat);
  body.position.y=0.45;group.add(body);
  const cabin=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.7,1.6),
    new THREE.MeshStandardMaterial({color:0x020617}));
  cabin.position.set(0,0.95,-0.1);group.add(cabin);
  const wheelGeo=new THREE.CylinderGeometry(0.34,0.34,0.42,18);
  wheelGeo.rotateZ(Math.PI/2);
  const wheelMat=new THREE.MeshStandardMaterial({color:0x020617});
  const offsets=[[0.95,0.25,1.2],[-0.95,0.25,1.2],[0.95,0.25,-1.2],[-0.95,0.25,-1.2]];
  const wheels=[];
  offsets.forEach(o=>{
    const w=new THREE.Mesh(wheelGeo,wheelMat);
    w.position.set(o[0],o[1],o[2]);
    w.castShadow=true;
    group.add(w);
    wheels.push(w);
  });
  return {group,wheels};
}
function makeSupraStyle(){
  const group=new THREE.Group();
  const bodyMat=new THREE.MeshStandardMaterial({color:0xf97316,metalness:0.6,roughness:0.35});
  const body=new THREE.Mesh(new THREE.BoxGeometry(1.9,0.55,3.5),bodyMat);
  body.position.y=0.45;group.add(body);
  const cabin=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.7,1.5),
    new THREE.MeshStandardMaterial({color:0x020617}));
  cabin.position.set(0,0.95,-0.1);group.add(cabin);
  const spoiler=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.08,0.5),
    new THREE.MeshStandardMaterial({color:0x111827}));
  spoiler.position.set(0,0.95,-1.7);group.add(spoiler);
  const wheelGeo=new THREE.CylinderGeometry(0.34,0.34,0.42,18);
  wheelGeo.rotateZ(Math.PI/2);
  const wheelMat=new THREE.MeshStandardMaterial({color:0x020617});
  const offsets=[[0.95,0.25,1.25],[-0.95,0.25,1.25],[0.95,0.25,-1.25],[-0.95,0.25,-1.25]];
  const wheels=[];
  offsets.forEach(o=>{
    const w=new THREE.Mesh(wheelGeo,wheelMat);
    w.position.set(o[0],o[1],o[2]);
    w.castShadow=true;
    group.add(w);
    wheels.push(w);
  });
  return {group,wheels};
}
function makePoliceCar(){
  const {group,wheels}=makeSupraStyle();
  group.traverse(o=>{
    if(o.isMesh && o.material && o.material.color){
      o.material.color.offsetHSL(0.55,0,0);
    }
  });
  const lightBar=new THREE.Mesh(
    new THREE.BoxGeometry(0.8,0.12,0.3),
    new THREE.MeshStandardMaterial({color:0x1d4ed8,emissive:0x1d4ed8,emissiveIntensity:1.2})
  );
  lightBar.position.set(0,1.1,0);
  group.add(lightBar);
  return {group,wheels};
}
function makeCarMesh(type){
  if(type==='ferrari') return makeFerrariStyle();
  if(type==='bugatti') return makeBugattiStyle();
  if(type==='porsche') return makePorscheStyle();
  if(type==='supra') return makeSupraStyle();
  if(type==='police') return makePoliceCar();
  return makeFerrariStyle();
}

/* Nitro flames */

function attachFlamesToCar(car){
  const flameGeo=new THREE.ConeGeometry(0.15,0.45,10);
  const baseMat=new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,opacity:0});
  const flameL=new THREE.Mesh(flameGeo,baseMat.clone());
  const flameR=new THREE.Mesh(flameGeo,baseMat.clone());
  flameL.rotation.x=Math.PI;flameR.rotation.x=Math.PI;
  flameL.position.set(0.35,0.32,-1.9);
  flameR.position.set(-0.35,0.32,-1.9);
  car.mesh.add(flameL);car.mesh.add(flameR);
  car.flames=[flameL,flameR];
}

/* Car state */

function createCarState(mesh,wheels,opts){
  return {
    mesh,wheels,
    pos:new THREE.Vector3(),
    heading:0,
    speed:0,
    steer:0,
    throttle:0,
    maxSpeed:opts.maxSpeed,
    accel:opts.accel,
    brake:opts.brake,
    drag:opts.drag,
    baseGrip:opts.baseGrip,
    turnSpeed:opts.turnSpeed,
    ai:!!opts.ai,
    tOnSpline:opts.tOnSpline||0,
    lap:0,
    lastCheckpoint:0,
    name:opts.name||'CPU',
    damage:0,
    fuel:1,
    boost:1,
    skidTimer:0,
    laneOffset:opts.laneOffset||0,
    overtakeTimer:0,
    isCop:!!opts.isCop,
    flames:[],
    driftFactor:0
  };
}

/* Skid, smoke, crash */

const skidGroup=new THREE.Group();scene.add(skidGroup);
const smokeGroup=new THREE.Group();scene.add(smokeGroup);
const crashGroup=new THREE.Group();scene.add(crashGroup);

function addSkid(pos){
  const geo=new THREE.PlaneGeometry(0.12,0.6);
  const mat=new THREE.MeshBasicMaterial({color:0x111827,transparent:true,opacity:0.7,side:THREE.DoubleSide});
  const m=new THREE.Mesh(geo,mat);
  m.rotation.x=-Math.PI/2;
  m.position.copy(pos);m.position.y=0.01;
  skidGroup.add(m);
  if(skidGroup.children.length>500) skidGroup.remove(skidGroup.children[0]);
}
function addSmoke(pos){
  const geo=new THREE.SphereGeometry(0.12,8,8);
  const mat=new THREE.MeshBasicMaterial({color:0xd4d4d8,transparent:true,opacity:0.7});
  const m=new THREE.Mesh(geo,mat);
  m.position.copy(pos);m.position.y+=0.2;
  m.userData.life=0.5;
  smokeGroup.add(m);
}
function addCrashParticles(pos){
  for(let i=0;i<8;i++){
    const geo=new THREE.SphereGeometry(0.06,6,6);
    const mat=new THREE.MeshBasicMaterial({color:0xffbb33,transparent:true,opacity:0.9});
    const p=new THREE.Mesh(geo,mat);
    p.position.copy(pos);p.position.y+=0.2;
    p.userData.vel=new THREE.Vector3(
      (Math.random()-0.5)*0.6,
      Math.random()*0.7,
      (Math.random()-0.5)*0.6
    );
    p.userData.life=0.45;
    crashGroup.add(p);
  }
}

/* Input */

const keys={};
window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});

let touchLeft=false,touchRight=false,touchForward=false,touchBoost=false;
function bindTouch(el,onStart,onEnd){
  el.addEventListener('touchstart',e=>{e.preventDefault();onStart();},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();onEnd();},{passive:false});
  el.addEventListener('mousedown',()=>onStart());
  el.addEventListener('mouseup',()=>onEnd());
  el.addEventListener('mouseleave',()=>onEnd());
}
const btnLeft=document.getElementById('btnLeft');
const btnRight=document.getElementById('btnRight');
const btnForward=document.getElementById('btnForward');
const btnBoost=document.getElementById('btnBoost');
bindTouch(btnLeft,()=>touchLeft=true,()=>touchLeft=false);
bindTouch(btnRight,()=>touchRight=true,()=>touchRight=false);
bindTouch(btnForward,()=>touchForward=true,()=>touchForward=false);
bindTouch(btnBoost,()=>touchBoost=true,()=>touchBoost=false);

/* Wall collision */

let cameraShakeTimer=0;
function resolveWallCollision(car,wallPos,minDist=3.5){
  const dx=car.pos.x-wallPos.x;
  const dz=car.pos.z-wallPos.z;
  const dist=Math.sqrt(dx*dx+dz*dz);
  if(dist<minDist){
    const push=minDist-dist;
    const dir=new THREE.Vector3(dx,0,dz).normalize();
    car.pos.add(dir.multiplyScalar(push*1.4));
    car.speed=Math.max(car.speed,0.12);
    car.damage=Math.min(1,car.damage+0.03);
    cameraShakeTimer=0.15;
    addCrashParticles(car.pos.clone());
  }
}

/* Damage visuals + flames */

function updateCarDamageVisual(car){
  const d=car.damage;
  car.mesh.traverse(o=>{
    if(o.isMesh && o.material && o.material.color){
      if(!o.userData.baseColor) o.userData.baseColor=o.material.color.clone();
      const base=o.userData.baseColor;
      const dark=base.clone().lerp(new THREE.Color(0x111827),d*0.8);
      o.material.color.copy(dark);
      o.material.roughness=Math.min(1,0.3+0.7*d);
    }
  });
  if(d>0.6){
    const p=car.mesh.position.clone();p.y+=0.4;
    addSmoke(p);
  }
}
function updateFlames(car,boosting,dt){
  if(!car.flames) return;
  const targetOpacity=boosting?0.9:0;
  car.flames.forEach(f=>{
    f.material.opacity+= (targetOpacity-f.material.opacity)*Math.min(1,dt*10);
    f.scale.setScalar(boosting?1+Math.random()*0.4:1);
  });
}

/* Player physics */

let player;
let aiCars=[];
let cops=[];
const boostFill=document.getElementById('boostFill');
const fuelFill=document.getElementById('fuelFill');
const damageFill=document.getElementById('damageFill');

function updatePlayer(dt){
  const forwardKey=keys['w']||keys['arrowup']||touchForward;
  const backKey=keys['s']||keys['arrowdown'];
  const leftKey=keys['a']||keys['arrowleft']||touchLeft;
  const rightKey=keys['d']||keys['arrowright']||touchRight;
  const boostKey=keys['shift']||touchBoost;

  player.throttle=forwardKey?1:backKey?-1:0;

  let steerInput=0;
  if(leftKey&&!rightKey) steerInput=-1;
  else if(rightKey&&!leftKey) steerInput=1;
  player.steer=-steerInput;

  const boosting=boostKey && player.boost>0;
  if(boosting){
    player.boost-=dt*0.25;
    if(player.boost<0) player.boost=0;
  }else{
    player.boost+=dt*0.12;
    if(player.boost>1) player.boost=1;
  }
  boostFill.style.width=(player.boost*100)+'%';

  const boostFactor=1+(boosting?0.5:0);

  if(player.throttle!==0){
    player.speed+=player.throttle*player.accel*dt*boostFactor;
  }else{
    player.speed-=player.drag*dt*Math.sign(player.speed);
  }

  const maxFwd=player.maxSpeed*boostFactor;
  const maxRev=-player.maxSpeed*0.35;
  player.speed=Math.min(maxFwd,Math.max(maxRev,player.speed));
  if(Math.abs(player.speed)<0.001) player.speed=0;

  const speedNorm=maxFwd>0?Math.min(1,Math.abs(player.speed)/maxFwd):0;
  const turnRate=player.turnSpeed*(0.45+0.55*speedNorm);
  player.heading+=player.steer*turnRate*dt;

  const q=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),player.heading);
  player.mesh.quaternion.slerp(q,Math.min(1,18*dt));

  const forward=new THREE.Vector3(0,0,1).applyQuaternion(player.mesh.quaternion);

  const driftIntensity=Math.min(1,Math.abs(player.steer)*1.4*speedNorm);
  player.driftFactor+=(driftIntensity-player.driftFactor)*Math.min(1,dt*6);
  const lateral=new THREE.Vector3(-forward.z,0,forward.x).multiplyScalar(player.driftFactor*0.8);
  const moveDir=forward.clone().add(lateral).normalize();

  player.pos.add(moveDir.multiplyScalar(player.speed*dt*60));

  for(const wall of stadiumWalls){
    resolveWallCollision(player,wall.position,3.5);
  }

  player.mesh.position.copy(player.pos);
  player.mesh.position.y=0.5;

  const wheelRot=player.speed*dt*40;
  player.wheels.forEach(w=>w.rotation.x-=wheelRot);

  const slip=Math.abs(player.speed)*Math.abs(player.steer);
  if(slip>0.15 && Math.abs(player.speed)>0.25){
    player.skidTimer+=dt;
    if(player.skidTimer>0.03){
      const rl=player.wheels[2].getWorldPosition(new THREE.Vector3());
      const rr=player.wheels[3].getWorldPosition(new THREE.Vector3());
      addSkid(rl);addSkid(rr);
      addSmoke(rl);addSmoke(rr);
      player.skidTimer=0;
    }
  }else player.skidTimer=0;

  player.fuel=Math.max(0,player.fuel-dt*0.01*(0.3+speedNorm));
  if(player.fuel<=0) player.speed*=0.98;

  damageFill.style.width=(player.damage*100)+'%';
  fuelFill.style.width=(player.fuel*100)+'%';

  updateCarDamageVisual(player);
  updateFlames(player,boosting,dt);
}

/* AI + cop */

function updateAI(car,dt){
  car.tOnSpline+=dt*(car.maxSpeed*0.012);
  if(car.tOnSpline>1) car.tOnSpline-=1;
  const target=spline.getPointAt(car.tOnSpline);
  const dir=target.clone().sub(car.pos);
  const desiredHeading=Math.atan2(dir.x,dir.z);
  let diff=desiredHeading-car.heading;
  diff=Math.atan2(Math.sin(diff),Math.cos(diff));
  car.steer=THREE.MathUtils.clamp(diff*2.2,-1,1);
  car.throttle=1;
  car.speed+=car.accel*dt;
  if(car.speed>car.maxSpeed) car.speed=car.maxSpeed;
  const q=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),car.heading);
  const forward=new THREE.Vector3(0,0,1).applyQuaternion(q);
  car.heading+=car.steer*car.turnSpeed*dt;
  car.pos.add(forward.multiplyScalar(car.speed*dt*60));
  for(const wall of stadiumWalls){
    resolveWallCollision(car,wall.position,3.5);
  }
  car.mesh.position.copy(car.pos);car.mesh.position.y=0.5;
  const wheelRot=car.speed*dt*40;
  car.wheels.forEach(w=>w.rotation.x-=wheelRot);
}
function updateCop(car,dt){
  const target=player.pos.clone();
  const dir=target.clone().sub(car.pos);
  const desiredHeading=Math.atan2(dir.x,dir.z);
  let diff=desiredHeading-car.heading;
  diff=Math.atan2(Math.sin(diff),Math.cos(diff));
  car.steer=THREE.MathUtils.clamp(diff*2.5,-1,1);
  car.throttle=1;
  car.speed+=car.accel*dt;
  if(car.speed>car.maxSpeed) car.speed=car.maxSpeed;
  const q=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),car.heading);
  const forward=new THREE.Vector3(0,0,1).applyQuaternion(q);
  car.heading+=car.steer*car.turnSpeed*dt;
  car.pos.add(forward.multiplyScalar(car.speed*dt*60));
  for(const wall of stadiumWalls){
    resolveWallCollision(car,wall.position,3.5);
  }
  car.mesh.position.copy(car.pos);car.mesh.position.y=0.5;
  const wheelRot=car.speed*dt*40;
  car.wheels.forEach(w=>w.rotation.x-=wheelRot);
}

/* Checkpoints + laps */

let raceStarted=false;
let raceFinished=false;
let totalLaps=3;
let sessionStartTime=0;
let currentLapStartTime=0;
let bestLap=null;

function checkCheckpoints(){
  if(!raceStarted||raceFinished) return;
  const pos=player.pos;
  const cp=checkpoints[player.lastCheckpoint];
  if(!cp) return;
  if(pos.distanceTo(cp.p)<4){
    player.lastCheckpoint++;
    if(player.lastCheckpoint>=checkpoints.length){
      player.lastCheckpoint=0;
      player.lap++;
      const now=performance.now();
      const lapTime=(now-currentLapStartTime)/1000;
      if(!bestLap||lapTime<bestLap) bestLap=lapTime;
      currentLapStartTime=now;
      if(player.lap>=totalLaps){
        finishRace();
      }
    }
  }
}
function finishRace(){
  raceFinished=true;
  running=false;
  bannerText.textContent='FINISH!';
  bannerText.style.display='block';
  setTimeout(()=>bannerText.style.display='none',2000);
}

/* HUD + minimap */

const hudLap=document.getElementById('hudLap');
const hudPos=document.getElementById('hudPos');
const hudSpeed=document.getElementById('hudSpeed');
const hudTimer=document.getElementById('hudTimer');
const hudBest=document.getElementById('hudBest');
const minimapCanvas=document.getElementById('minimapCanvas');
const minimapCtx=minimapCanvas.getContext('2d');

function updateHUD(){
  hudLap.textContent=`Lap: ${player.lap} / ${totalLaps}`;
  let pos=1;
  for(const ai of aiCars){
    if(ai.lap>player.lap) pos++;
    else if(ai.lap===player.lap){
      if(ai.lastCheckpoint>player.lastCheckpoint) pos++;
    }
  }
  hudPos.textContent=`Pos: ${pos} / ${aiCars.length+1}`;
  hudSpeed.textContent=`Speed: ${Math.round(player.speed*50)}`;
  if(bestLap) hudBest.textContent=`Best: ${bestLap.toFixed(3)}`;
  if(raceStarted && !raceFinished){
    const t=(performance.now()-sessionStartTime)/1000;
    hudTimer.textContent=`Time: ${t.toFixed(3)}`;
  }
}
function drawMinimap(){
  const ctx=minimapCtx;
  ctx.clearRect(0,0,140,140);
  ctx.save();
  ctx.translate(70,70);
  ctx.scale(2.2,2.2);
  ctx.strokeStyle='#334155';
  ctx.lineWidth=2;
  ctx.beginPath();
  for(let i=0;i<200;i++){
    const t=i/200;
    const p=spline.getPointAt(t);
    if(i===0) ctx.moveTo(p.x,p.z);
    else ctx.lineTo(p.x,p.z);
  }
  ctx.stroke();
  ctx.fillStyle='#22c55e';
  ctx.beginPath();
  ctx.arc(player.pos.x,player.pos.z,2,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#ef4444';
  aiCars.forEach(ai=>{
    ctx.beginPath();
    ctx.arc(ai.pos.x,ai.pos.z,2,0,Math.PI*2);
    ctx.fill();
  });
  ctx.fillStyle='#3b82f6';
  cops.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.pos.x,c.pos.z,2,0,Math.PI*2);
    ctx.fill();
  });
  ctx.restore();
}

/* Camera */

let cameraLagPos=new THREE.Vector3();
let cameraLagFactor=2.5;
function applyCamera(dt){
  const maxFwd=player.maxSpeed*1.4;
  const speedNorm=maxFwd>0?Math.min(1,Math.abs(player.speed)/maxFwd):0;
  const baseOffset=new THREE.Vector3(0,4.2,-10-4*speedNorm).applyQuaternion(player.mesh.quaternion);
  const desired=player.mesh.position.clone().add(baseOffset);
  if(cameraLagPos.lengthSq()===0) cameraLagPos.copy(desired);
  cameraLagPos.lerp(desired,Math.min(1,cameraLagFactor*dt));
  if(cameraShakeTimer>0){
    cameraShakeTimer-=dt;
    const intensity=cameraShakeTimer*4;
    cameraLagPos.x+=(Math.random()-0.5)*intensity;
    cameraLagPos.y+=(Math.random()-0.5)*intensity*0.5;
    cameraLagPos.z+=(Math.random()-0.5)*intensity;
  }
  camera.position.copy(cameraLagPos);
  camera.lookAt(player.mesh.position.clone().add(new THREE.Vector3(0,0.6,0)));
}

/* Particles update */

function updateParticles(dt){
  for(let i=smokeGroup.children.length-1;i>=0;i--){
    const s=smokeGroup.children[i];
    s.userData.life-=dt;
    s.position.y+=dt*1.2;
    s.material.opacity-=dt*1.4;
    if(s.userData.life<=0) smokeGroup.remove(s);
  }
  for(let i=crashGroup.children.length-1;i>=0;i--){
    const p=crashGroup.children[i];
    p.userData.life-=dt;
    p.position.add(p.userData.vel.clone().multiplyScalar(dt*20));
    p.material.opacity-=dt*2;
    if(p.userData.life<=0) crashGroup.remove(p);
  }
}

/* Race state + countdown */

let running=false;
let countdownRunning=false;
const l1=document.getElementById('l1');
const l2=document.getElementById('l2');
const l3=document.getElementById('l3');
const l4=document.getElementById('l4');
const l5=document.getElementById('l5');
const bannerText=document.getElementById('bannerText');

function startCountdown(){
  countdownRunning=true;
  raceStarted=false;
  raceFinished=false;
  [l1,l2,l3,l4,l5].forEach(l=>l.classList.remove('on'));
  let step=0;
  const lights=[l1,l2,l3,l4,l5];
  function tick(){
    if(step<5){
      lights[step].classList.add('on');
      step++;
      setTimeout(tick,700);
    }else{
      bannerText.textContent='GO!';
      bannerText.style.display='block';
      setTimeout(()=>bannerText.style.display='none',800);
      raceStarted=true;
      running=true;
      countdownRunning=false;
      sessionStartTime=performance.now();
      currentLapStartTime=performance.now();
    }
  }
  tick();
}

/* Reset cars */

function resetCars(){
  player.pos.set(0,0,0);
  player.heading=0;
  player.speed=0;
  player.lap=0;
  player.lastCheckpoint=0;
  player.damage=0;
  player.fuel=1;
  player.boost=1;
  player.mesh.position.set(0,0.5,0);
  player.mesh.rotation.set(0,0,0);
  aiCars.forEach((ai,i)=>{
    ai.tOnSpline=i*0.3;
    ai.pos.copy(spline.getPointAt(ai.tOnSpline));
    ai.heading=0;ai.speed=0;ai.lap=0;ai.lastCheckpoint=0;
    ai.mesh.position.copy(ai.pos);ai.mesh.position.y=0.5;
  });
  cops.forEach((c,i)=>{
    c.tOnSpline=0.15+i*0.2;
    c.pos.copy(spline.getPointAt(c.tOnSpline));
    c.heading=0;c.speed=0;
    c.mesh.position.copy(c.pos);c.mesh.position.y=0.5;
  });
  raceStarted=false;
  raceFinished=false;
  running=false;
}

/* UI wiring */

const startBtn=document.getElementById('startBtn');
const resetBtn=document.getElementById('resetBtn');
const pauseBtn=document.getElementById('pauseBtn');
const trackSelect=document.getElementById('trackSelect');
const homeScreen=document.getElementById('homeScreen');
const garage=document.getElementById('garage');
const modeRaceBtn=document.getElementById('modeRaceBtn');
const modeTimeBtn=document.getElementById('modeTimeBtn');
const modeCopsBtn=document.getElementById('modeCopsBtn');
const garageStartBtn=document.getElementById('garageStartBtn');
const garageBackBtn=document.getElementById('garageBackBtn');
const carSelect=document.getElementById('carSelect');

let selectedCarType='ferrari';

modeRaceBtn.onclick=()=>{homeScreen.style.display='none';garage.style.display='flex';};
modeTimeBtn.onclick=()=>{homeScreen.style.display='none';garage.style.display='flex';};
modeCopsBtn.onclick=()=>{homeScreen.style.display='none';garage.style.display='flex';};
garageBackBtn.onclick=()=>{garage.style.display='none';homeScreen.style.display='flex';};
carSelect.onchange=()=>{selectedCarType=carSelect.value;};

garageStartBtn.onclick=()=>{
  garage.style.display='none';
};

startBtn.onclick=()=>{
  if(countdownRunning||running) return;
  resetCars();
  startCountdown();
};
resetBtn.onclick=()=>{resetCars();};
pauseBtn.onclick=()=>{
  running=!running;
  pauseBtn.textContent=running?'Pause':'Resume';
};
trackSelect.onchange=()=>{
  const v=trackSelect.value;
  if(v==='classic') spline=buildClassic();
  if(v==='oval') spline=buildOval();
  if(v==='figure8') spline=buildFigure8();
  buildRoad(spline);
  buildTrackWalls(spline);
  buildCheckpoints();
  resetCars();
};

/* Init cars + track */

function initGame(){
  spline=buildClassic();
  buildRoad(spline);
  buildTrackWalls(spline);
  buildCheckpoints();

  const playerCar=makeCarMesh(selectedCarType);
  playerCar.group.castShadow=true;
  scene.add(playerCar.group);
  player=createCarState(playerCar.group,playerCar.wheels,{
    maxSpeed:0.9,accel:1.6,brake:2.5,drag:0.9,baseGrip:1,turnSpeed:2.4
  });
  attachFlamesToCar(player);

  aiCars=[];
  for(let i=0;i<2;i++){
    const aiCar=makeCarMesh(i===0?'porsche':'bugatti');
    scene.add(aiCar.group);
    const ai=createCarState(aiCar.group,aiCar.wheels,{
      maxSpeed:0.8,accel:1.2,brake:2,drag:0.8,baseGrip:1,turnSpeed:2.0,ai:true,tOnSpline:i*0.3
    });
    ai.pos.copy(spline.getPointAt(ai.tOnSpline));
    ai.mesh.position.copy(ai.pos);ai.mesh.position.y=0.5;
    aiCars.push(ai);
  }

  cops=[];
  const copCar=makePoliceCar();
  scene.add(copCar.group);
  const cop=createCarState(copCar.group,copCar.wheels,{
    maxSpeed:1.0,accel:1.5,brake:2.2,drag:0.9,baseGrip:1,turnSpeed:2.6,isCop:true,tOnSpline:0.15
  });
  cop.pos.copy(spline.getPointAt(cop.tOnSpline));
  cop.mesh.position.copy(cop.pos);cop.mesh.position.y=0.5;
  cops.push(cop);

  resetCars();
}
initGame();

/* Main loop */

let lastTime=performance.now();
function loop(){
  requestAnimationFrame(loop);
  const now=performance.now();
  const dt=Math.min(0.033,(now-lastTime)/1000);
  lastTime=now;
  if(running){
    updatePlayer(dt);
    aiCars.forEach(ai=>updateAI(ai,dt));
    cops.forEach(c=>updateCop(c,dt));
    checkCheckpoints();
  }
  updateParticles(dt);
  updateHUD();
  drawMinimap();
  updateCheckpointArrows(dt);
  updateRain(dt);
  updateDayNight(dt);
  applyCamera(dt);
  renderer.render(scene,camera);
}
loop();

/* Resize */

window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>
