<svg width="260" height="60" viewBox="0 0 260 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="asphaltGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd200"/>
      <stop offset="50%" stop-color="#ff9b00"/>
      <stop offset="100%" stop-color="#ff4b00"/>
    </linearGradient>
  </defs>

  <!-- Dark background pill -->
  <rect x="0" y="8" rx="12" ry="12" width="260" height="44" fill="#111111"/>

  <!-- Subtle border -->
  <rect x="1.5" y="9.5" rx="10" ry="10" width="257" height="41" fill="none" stroke="#444" stroke-width="1.5"/>

  <!-- Speed underline -->
  <rect x="20" y="42" width="150" height="3" fill="url(#asphaltGradient)"/>

  <!-- ASPHALT text -->
  <text x="24" y="36"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22"
        font-weight="700"
        letter-spacing="4"
        fill="url(#asphaltGradient)">
    ASPHALT
  </text>

  <!-- SIM text -->
  <text x="190" y="36"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16"
        font-weight="600"
        letter-spacing="3"
        fill="#ffffff">
    SIM
  </text>
</svg>
